<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeeBee - Lộ Trình Học Tập Thông Minh</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css"/>
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.umd.fdoc.js"></script>
    
    <style>
        /* SỬA LỖI KHÔNG CUỘN ĐƯỢC TRÊN MÁY TÍNH */
        html, body {
            overflow-y: auto !important;
            height: auto !important;
            min-height: 100vh;
            background-color: #f7fee7; /* lime-50 */
        }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased pb-12">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border-2 border-yellow-400">
            <div class="text-center mb-6">
                <span class="text-5xl">🐝</span>
                <h1 class="text-3xl font-bold text-yellow-600 mt-2">Chào mừng tới BeeBee</h1>
                <p class="text-gray-500 text-sm">Tự tạo lộ trình - Ghi nhớ tương lai</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Email của bạn</label>
                    <input type="email" id="auth-email" class="w-full p-3 border border-gray-300 rounded-xl focus:outline-yellow-500" placeholder="name@example.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Mật khẩu</label>
                    <input type="password" id="auth-password" class="w-full p-3 border border-gray-300 rounded-xl focus:outline-yellow-500" placeholder="••••••••">
                </div>
                
                <button onclick="handleAuth('signin')" id="btn-login" class="w-full bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-3 rounded-xl transition duration-200 cursor-pointer">Đăng Nhập</button>
                <button onclick="handleAuth('signup')" id="btn-register" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 rounded-xl transition duration-200 cursor-pointer text-sm">Chưa có tài khoản? Đăng ký ngay</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden max-w-4xl mx-auto px-4 pt-6">
        <header class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-yellow-200 mb-6">
            <div class="flex items-center gap-2">
                <span class="text-3xl">🐝</span>
                <span class="text-xl font-bold text-yellow-600">BeeBee Dashboard</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-sm font-medium text-gray-600">User: ...</span>
                <button onclick="logout()" class="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-3 py-2 rounded-lg font-semibold transition">Đăng xuất</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div id="tour-setup" class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 h-fit">
                <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">🎯 Thiết Lập Lộ Trình</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Mục tiêu học tập</label>
                        <input type="text" id="plan-title" class="w-full p-2.5 border rounded-xl" placeholder="Ví dụ: Học tiếng Anh giao tiếp">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Số ngày hoàn thành</label>
                        <input type="number" id="plan-days" min="1" max="90" value="7" class="w-full p-2.5 border rounded-xl">
                    </div>
                    <button onclick="createNewPlan()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-2.5 rounded-xl transition cursor-pointer">Khởi Tạo Lộ Trình</button>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div id="tour-progress" class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
                    <h2 class="text-lg font-bold text-gray-900 mb-2">📈 Tiến Độ Của Bạn</h2>
                    <div class="w-full bg-gray-100 rounded-full h-4 overflow-hidden mb-2">
                        <div id="progress-bar" class="bg-yellow-400 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <p id="progress-text" class="text-sm text-gray-500 font-medium">Bạn chưa khởi tạo lộ trình nào.</p>
                </div>

                <div id="tour-timeline" class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">📅 Chi Tiết Lộ Trình Từng Ngày</h2>
                    <div id="timeline-container" class="space-y-3">
                        <p class="text-gray-400 text-center py-6 text-sm">Điền thông tin bên trái để tạo lịch trình riêng của bạn.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ĐÃ TÍCH HỢP THÔNG TIN FIREBASE CỦA BẠN 🐝
        const firebaseConfig = {
            apiKey: "AIzaSyAQp5aYmT9qc3k6gvK505aQxbz1uzRC6mg",
            authDomain: "beebee-8db3f.firebaseapp.com",
            projectId: "beebee-8db3f",
            storageBucket: "beebee-8db3f.firebasestorage.app",
            messagingSenderId: "126534251045",
            appId: "1:126534251045:web:0d954cee5f88d84e2e85cc",
            measurementId: "G-JTZ0TX3SH8"
        };
        
        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let userPlanData = null;

        // KIỂM TRA ĐĂNG NHẬP
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                
                loadUserPlan();
            } else {
                currentUser = null;
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // ĐĂNG KÝ / ĐĂNG NHẬP
        function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            if(!email || !password) return alert("Vui lòng nhập đầy đủ Email và Mật khẩu!");

            if(type === 'signup') {
                auth.createUserWithEmailAndPassword(email, password)
                    .then(() => alert("Đăng ký tài khoản thành công!"))
                    .catch(err => alert("Lỗi đăng ký: " + err.message));
            } else {
                auth.signInWithEmailAndPassword(email, password)
                    .catch(err => alert("Lỗi đăng nhập: " + err.message));
            }
        }

        function logout() {
            auth.signOut();
        }

        // TẠO LỘ TRÌNH RIÊNG CHO MỖI TÀI KHOẢN
        function createNewPlan() {
            const title = document.getElementById('plan-title').value;
            const days = parseInt(document.getElementById('plan-days').value);

            if(!title) return alert("Hãy điền mục tiêu học tập!");

            const daysArray = [];
            for(let i = 1; i <= days; i++) {
                daysArray.push({ day: i, task: `Hoàn thành bài học ngày thứ ${i}`, done: false });
            }

            userPlanData = {
                title: title,
                totalDays: days,
                days: daysArray,
                updatedAt: new Date()
            };

            db.collection("user_plans").doc(currentUser.uid).set(userPlanData)
                .then(() => {
                    renderPlan();
                })
                .catch(err => alert("Lỗi đồng bộ dữ liệu: Hãy chắc chắn bạn đã bật chế độ 'Test Mode' trong Firestore!"));
        }

        function loadUserPlan() {
            db.collection("user_plans").doc(currentUser.uid).get().then(doc => {
                if (doc.exists) {
                    userPlanData = doc.data();
                    renderPlan();
                } else {
                    // Hướng dẫn sử dụng cho người vào lần đầu
                    startTourGuide();
                }
            }).catch(err => console.log("Chờ khởi tạo database..."));
        }

        function toggleDay(index) {
            userPlanData.days[index].done = !userPlanData.days[index].done;
            db.collection("user_plans").doc(currentUser.uid).update({
                days: userPlanData.days
            }).then(() => renderPlan());
        }

        function renderPlan() {
            if(!userPlanData) return;

            const container = document.getElementById('timeline-container');
            container.innerHTML = "";

            let doneCount = 0;

            userPlanData.days.forEach((item, index) => {
                if(item.done) doneCount++;

                const div = document.createElement('div');
                div.className = `p-4 border rounded-xl flex justify-between items-center transition ${item.done ? 'bg-green-50 border-green-300' : 'bg-gray-50 border-gray-200'}`;
                div.innerHTML = `
                    <div>
                        <h4 class="font-bold text-gray-800 ${item.done ? 'line-through text-gray-400' : ''}">Ngày ${item.day}: ${userPlanData.title}</h4>
                        <p class="text-xs text-gray-500">${item.task}</p>
                    </div>
                    <input type="checkbox" ${item.done ? 'checked' : ''} onclick="toggleDay(${index})" class="w-5 h-5 accent-green-600 cursor-pointer">
                `;
                container.appendChild(div);
            });

            const percent = userPlanData.days.length > 0 ? Math.round((doneCount / userPlanData.days.length) * 100) : 0;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').innerText = `Đã hoàn thành ${doneCount}/${userPlanData.days.length} ngày (${percent}%)`;
        }

        // TÍNH NĂNG TOUR GUIDE
        function startTourGuide() {
            const driver = window.driver.js.driver;
            const driverObj = driver({
                showProgress: true,
                steps: [
                    { element: '#tour-setup', popover: { title: '🐝 Tạo lộ trình', description: 'Chào bạn mới! Hãy bắt đầu ngày đầu tiên bằng cách điền Mục tiêu học tập và số ngày mong muốn vào đây, sau đó ấn nút khởi tạo.', side: "right", align: 'start' }},
                    { element: '#tour-progress', popover: { title: '📈 Theo dõi tiến độ', description: 'Thanh này sẽ tự tăng lên tương ứng với phần trăm số ngày bạn hoàn thành bài học.', side: "bottom", align: 'start' }},
                    { element: '#tour-timeline', popover: { title: '📅 Nhật ký hàng ngày', description: 'Hệ thống tự lên lộ trình chia nhỏ từng ngày tại đây. Mỗi khi học xong, bạn chỉ cần tích chọn để web ghi nhớ nhé!', side: "top", align: 'start' }}
                ]
            });
            driverObj.drive();
        }
    </script>
</body>
</html>
