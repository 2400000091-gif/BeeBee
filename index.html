<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeeBee - Thế Giới Học Tập Của Chú Ong Chăm Chỉ 🐝</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (Sử dụng CDNJS UMD ổn định để tránh lỗi import/module) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel Standalone -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.17/babel.min.js"></script>
    <style>
        /* Tải các font chữ chuẩn trong danh sách yêu cầu để tránh lỗi dấu tiếng Việt */
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap');
        
        /* Font chữ tiêu đề năng động, bắt mắt */
        h1, h2, h3, h4, .fun-font {
            font-family: 'Montserrat', 'Segoe UI', 'Arial', sans-serif;
            font-weight: 800;
        }
        
        /* Font chữ nội dung hiển thị tiếng Việt sắc nét, tối ưu nhất */
        body {
            font-family: 'Be Vietnam Pro', 'Segoe UI', 'Arial', sans-serif;
            background-color: #fefcbf; /* Màu nền mật ong sữa dịu mắt */
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #fef08a;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #facc15;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #eab308;
        }
        
        /* Hiệu ứng nhún nhảy vui mắt mô phỏng chú ong bay lượn */
        @keyframes buzz {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-6px) rotate(-3deg); }
            75% { transform: translateY(-2px) rotate(3deg); }
        }
        .animate-buzz {
            animation: buzz 2s infinite ease-in-out;
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-wave {
            animation: wave 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; background-color: #fef08a; }
        }
        .animate-breathe {
            animation: breathe 5s infinite ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Giao diện họa tiết tổ ong độc đáo */
        .honeycomb-bg {
            background-image: radial-gradient(#fef08a 20%, transparent 20%),
                              radial-gradient(#fef08a 20%, transparent 20%);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }
    </style>
</head>
<body class="bg-[#fffdf0] text-slate-800 honeycomb-bg">
    <div id="root"></div>

    <script type="text/babel">
        // --- DANH SÁCH CÂU CHÂM NGÔN ĐỘNG LỰC (MẬT NGỌT ĐỘNG LỰC) ---
        const MOTIVATIONAL_QUOTES = [
            "Kiên trì tích góp kiến thức mỗi ngày như chú ong nhỏ chăm chỉ gom từng giọt mật thơm ngon! 🐝",
            "Mỗi bài tập bạn làm xong là một nhị hoa ngọt ngào được thụ phấn thành công! 🌸",
            "Đừng để sự trì hoãn làm nguội lạnh đôi cánh đam mê của bạn. Bay lên nào! 🚀",
            "Tổ ong tri thức vững chắc nhất được xây dựng từ những viên gạch tự học nhỏ bé hằng ngày. 🧱",
            "Hành trình vạn dặm bắt đầu từ một cái đập cánh đầu tiên. Làm ngay ca học nhé! ⏱️",
            "Kỷ luật tự học chính là chất xúc tác ngọt ngào nhất biến ước mơ thành sự thật! ✨"
        ];

        // --- CÁC LOẠI THÚ CƯNG CÓ THỂ CHỌN ---
        const AVAILABLE_PETS = [
            { id: 'bee', emoji: '🐝', name: 'Ong Vàng BeeBee', desc: 'Chú ong siêng năng nhất hệ mặt trời, rất ham học hỏi.' },
            { id: 'hamster', emoji: '🐹', name: 'Hamster Má Phính', desc: 'Hamster thích nhâm nhi hạt hướng dương khi học bài.' },
            { id: 'cat', emoji: '🐱', name: 'Mèo Lười Học', desc: 'Cần bạn học Pomodoro kế bên để truyền động lực tập trung.' },
            { id: 'owl', emoji: '🦉', name: 'Cú Trí Tuệ', desc: 'Cú đêm thông thái chuyên trị các ca ôn thi muộn.' }
        ];

        // --- CÁC LOẠI CÂY TRỒNG TRONG VƯỜN HOA BEEBEE ---
        const AVAILABLE_PLANTS = [
            { id: 'sunflower', emoji: '🌻', name: 'Hoa Hướng Dương' },
            { id: 'rose', emoji: '🌹', name: 'Hoa Hồng Đỏ' },
            { id: 'tulip', emoji: '🌷', name: 'Hoa Tulip Sặc Sỡ' },
            { id: 'sakura', emoji: '🌸', name: 'Hoa Anh Đào' },
            { id: 'clover', emoji: '🍀', name: 'Cỏ Bốn Lá May Mắn' }
        ];

        // --- MEME HỌC TẬP HÀI HƯỚC SINH VIÊN ---
        const STUDY_MEMES = [
            { emoji: '🫠', text: "Khi Ong Chúa AI bảo bài tập này dễ lắm, chỉ cần nhìn lướt qua là hiểu..." },
            { emoji: '🤡', text: "Lên lịch bay đi gom mật lúc 19:00, mải chơi đến 19:01: Thôi đợi hẳn 20:00 vậy!" },
            { emoji: '😴', text: "Học được 5 phút, tự thưởng cho mình 2 tiếng lướt mạng xã hội nạp năng lượng." },
            { emoji: '🧠', text: "Não bộ lúc đi thi: Quên sạch công thức toán lý nhưng lời nhạc hot trend thì nhớ van vách." }
        ];

        // --- KHỞI TẠO THỬ THÁCH ĐIỂM DANH 21 NGÀY ---
        const INITIAL_CHALLENGE = Array.from({ length: 21 }, (_, i) => ({
            day: i + 1,
            checked: i < 3 // Mặc định điểm danh trước 3 ngày làm mẫu
        }));

        // --- BỘ PHÁT ÂM THANH DU DƯƠNG CHUYÊN NGHIỆP (Web Audio API) ---
        let audioCtx = null;
        let lofiInterval = null;
        let ambientFilter = null;

        const startFocusSound = (trackId) => {
            try {
                if (audioCtx) {
                    stopFocusSound();
                }
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();

                if (trackId === 'rain' || trackId === 'waves' || trackId === 'cafe') {
                    const bufferSize = 2 * audioCtx.sampleRate;
                    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const output = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = Math.random() * 2 - 1;
                    }

                    const noiseSource = audioCtx.createBufferSource();
                    noiseSource.buffer = noiseBuffer;
                    noiseSource.loop = true;

                    ambientFilter = audioCtx.createBiquadFilter();
                    ambientFilter.type = 'lowpass';
                    ambientFilter.frequency.value = trackId === 'rain' ? 800 : trackId === 'waves' ? 400 : 350;

                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.15;

                    noiseSource.connect(ambientFilter);
                    ambientFilter.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    noiseSource.start(0);

                    if (trackId === 'waves') {
                        let time = 0;
                        lofiInterval = setInterval(() => {
                            time += 0.05;
                            gainNode.gain.value = 0.08 + 0.07 * Math.sin(time);
                        }, 50);
                    }
                } else if (trackId === 'lofi') {
                    ambientFilter = audioCtx.createBiquadFilter();
                    ambientFilter.type = 'lowpass';
                    ambientFilter.frequency.value = 1000;
                    ambientFilter.connect(audioCtx.destination);

                    const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00];
                    
                    lofiInterval = setInterval(() => {
                        try {
                            const osc = audioCtx.createOscillator();
                            const gain = audioCtx.createGain();
                            
                            osc.type = 'sine';
                            const targetFreq = notes[Math.floor(Math.random() * notes.length)];
                            osc.frequency.setValueAtTime(targetFreq, audioCtx.currentTime);
                            
                            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.8);
                            
                            osc.connect(gain);
                            gain.connect(ambientFilter);
                            
                            osc.start();
                            osc.stop(audioCtx.currentTime + 2.0);
                        } catch (e) {}
                    }, 2000);
                }
            } catch (e) {
                console.error("Trình duyệt chưa kích hoạt được AudioContext", e);
            }
        };

        const stopFocusSound = () => {
            if (lofiInterval) {
                clearInterval(lofiInterval);
                lofiInterval = null;
            }
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
        };

        // --- MAIN APPLICATION COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = React.useState('home');
            const [currentQuote, setCurrentQuote] = React.useState(MOTIVATIONAL_QUOTES[0]);
            const [studyHoursToday, setStudyHoursToday] = React.useState(1.8);
            const [coins, setCoins] = React.useState(200);
            const [xp, setXp] = React.useState(150); 
            const [streak, setStreak] = React.useState(6);
            const [toast, setToast] = React.useState(null);

            // Thú Cưng & Cây Trồng
            const [selectedPet, setSelectedPet] = React.useState(AVAILABLE_PETS[0]);
            const [petName, setPetName] = React.useState('Bé Ong Vàng');
            const [selectedPlant, setSelectedPlant] = React.useState(AVAILABLE_PLANTS[0]);

            // Trạng thái Điểm danh 21 ngày
            const [challenges, setChallenges] = React.useState(INITIAL_CHALLENGE);

            // Trạng thái AI (Ong Chúa Thông Thái)
            const [aiQuery, setAiQuery] = React.useState('');
            const [aiChat, setAiChat] = React.useState([
                { role: 'assistant', text: 'Xin chào chiến binh ong chăm chỉ! Ta là Ong Chúa Trí Tuệ. Hôm nay con cần ta đề xuất thời gian biểu hay giải đáp nhanh bài học khó nhằn nào không? 👑🐝' }
            ]);
            const [isAiLoading, setIsAiLoading] = React.useState(false);

            // Danh sách công việc (Mật Ngọt Công Việc)
            const [tasks, setTasks] = React.useState([
                { id: 1, subject: 'Lập trình Web', content: 'Hoàn thiện giao diện website học tập BeeBee năng động', date: '2026-06-20', time: '18:00', priority: 'high', completed: false },
                { id: 2, subject: 'Tiếng Anh', content: 'Học 30 từ vựng chủ đề bảo vệ môi trường sinh thái', date: '2026-06-20', time: '21:00', priority: 'medium', completed: false },
                { id: 3, subject: 'Toán Cao Cấp', content: 'Giải 5 bài tập tích phân suy rộng nâng cao', date: '2026-06-19', time: '14:00', priority: 'low', completed: true }
            ]);

            // Khu Vườn Hoa Lấy Mật của ong
            const [garden, setGarden] = React.useState(['🌻', '🌷', '🌸']);

            // Quản lý Phòng Mật nhóm
            const [rooms, setRooms] = React.useState([
                { id: 1, name: 'Vườn Hoa Tri Thức Bách Khoa 🏫', creator: 'Thành Đạt', activeUsers: 5, isJoined: false, code: 'BEE-999' },
                { id: 2, name: 'Tổ Ong Luyện Code Siêng Năng 💻', creator: 'Minh Tuấn', activeUsers: 8, isJoined: false, code: 'HONEY-888' }
            ]);

            // Nhật ký học tập (Nhật Ký Làm Mật)
            const [journals, setJournals] = React.useState([
                { id: 1, date: '20-06-2026', mood: '😊 Hào hứng', focus: 5, note: 'Học nhóm rất hiệu quả, hoàn thành được 2 đề toán.' }
            ]);

            // Thư gửi tương lai "Thư Gửi Ong Tương Lai"
            const [savedLetters, setSavedLetters] = React.useState([]);

            const triggerToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const gainRewards = (xpAmount, coinAmount) => {
                setXp(prev => prev + xpAmount);
                setCoins(prev => prev + coinAmount);
                triggerToast(`🍯 Nhận ngay +${xpAmount} XP và +${coinAmount} Mật Ngọt!`);
            };

            const currentLevel = Math.floor(xp / 100) + 1;
            const xpInLevel = xp % 100;

            // AI Gemini Integration
            const handleAskAI = async (e) => {
                e.preventDefault();
                if (!aiQuery.trim()) return;

                const userMsg = aiQuery;
                setAiChat(prev => [...prev, { role: 'user', text: userMsg }]);
                setAiQuery('');
                setIsAiLoading(true);

                const apiKey = ""; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const systemPrompt = "Bạn là AI đồng hành học tập tên 'Ong Chúa Trí Tuệ' của ứng dụng học tập BeeBee. Hãy trả lời học sinh bằng phong cách cổ vũ, tràn đầy năng lượng tích cực, xưng gọi con/ta hoặc bạn/mình ngọt ngào và dùng nhiều biểu tượng cảm xúc (emoji) chú ong, mật ong dễ thương.";

                const payload = {
                    contents: [{ parts: [{ text: userMsg }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                let delay = 1000;
                let success = false;
                let responseText = "";

                for (let attempt = 0; attempt < 5; attempt++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (response.ok) {
                            const result = await response.json();
                            responseText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Ta đang suy nghĩ, con hãy hỏi lại lần nữa nhé chú ong nhỏ!";
                            success = true;
                            break;
                        }
                    } catch (error) {}
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }

                if (success) {
                    setAiChat(prev => [...prev, { role: 'assistant', text: responseText }]);
                    gainRewards(10, 5);
                } else {
                    setAiChat(prev => [...prev, { role: 'assistant', text: "Ong Chúa đang bận họp với hội ong mật một chút. Con vui lòng đợi giây lát rồi thử lại nha! 🐝👑" }]);
                }
                setIsAiLoading(false);
            };

            return (
                <div className="flex flex-col md:flex-row h-screen w-full overflow-hidden text-slate-800">
                    {/* TOAST SYSTEM */}
                    {toast && (
                        <div className="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-3 bg-gradient-to-r from-yellow-400 to-amber-500 text-slate-900 px-6 py-4 rounded-3xl shadow-2xl border-4 border-slate-950 animate-bounce">
                            <span className="text-2xl">🍯</span>
                            <span className="font-extrabold text-sm">{toast.message}</span>
                        </div>
                    )}

                    {/* SIDE NAV FOR DESKTOP */}
                    <aside className="hidden md:flex flex-col w-72 bg-gradient-to-b from-yellow-300 via-yellow-400 to-amber-400 border-r-4 border-slate-900 p-6 flex-shrink-0 justify-between z-20">
                        <div>
                            <div className="flex items-center gap-3 mb-6 bg-white p-3 rounded-2xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                                <div className="w-11 h-11 bg-amber-400 rounded-xl flex items-center justify-center text-slate-900 text-2xl font-black shadow-inner border-2 border-slate-900 animate-buzz">
                                    🐝
                                </div>
                                <div>
                                    <h1 className="font-black text-base text-slate-900 tracking-tight fun-font">BeeBee</h1>
                                    <span className="text-[10px] font-black text-amber-900 uppercase tracking-wider block">Trạm Sạc Mật Ngọt</span>
                                </div>
                            </div>

                            {/* User Profile Progress Card */}
                            <div className="bg-white rounded-2xl p-4 mb-6 border-2 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-12 h-12 rounded-full bg-amber-100 flex items-center justify-center text-2xl border-2 border-slate-950 animate-wave">
                                        {selectedPet.emoji}
                                    </div>
                                    <div>
                                        <div className="font-bold text-xs text-slate-500">Pet đồng hành:</div>
                                        <div className="font-extrabold text-sm text-slate-800 fun-font truncate max-w-[120px]">{petName}</div>
                                    </div>
                                </div>
                                <div className="flex justify-between text-[11px] font-extrabold text-slate-700 mb-1">
                                    <span>Tổ ong cấp {currentLevel}</span>
                                    <span>💰 {coins} Mật ngọt</span>
                                </div>
                                <div className="w-full bg-slate-100 h-3 rounded-full overflow-hidden border-2 border-slate-900">
                                    <div className="bg-gradient-to-r from-amber-400 to-yellow-400 h-full transition-all duration-500" style={{ width: `${xpInLevel}%` }}></div>
                                </div>
                                <span className="text-[10px] text-slate-500 font-bold block text-right mt-1">{xpInLevel}/100 XP</span>
                            </div>

                            {/* Menu links */}
                            <nav className="space-y-1.5">
                                <SidebarButton active={activeTab === 'home'} onClick={() => setActiveTab('home')} label="Tổ Ong Ngọt Ngào" icon="🏠" />
                                <SidebarButton active={activeTab === 'planner'} onClick={() => setActiveTab('planner')} label="Mật Ngọt Công Việc" icon="📝" />
                                <SidebarButton active={activeTab === 'pomodoro'} onClick={() => setActiveTab('pomodoro')} label="Vườn Hoa Hút Mật" icon="🌸" />
                                <SidebarButton active={activeTab === 'ai'} onClick={() => setActiveTab('ai')} label="Ong Chúa Thông Thái 👑" icon="🔮" />
                                <SidebarButton active={activeTab === 'friends'} onClick={() => setActiveTab('friends')} label="Phòng Mật Nhóm" icon="👥" />
                                <SidebarButton active={activeTab === 'gamification'} onClick={() => setActiveTab('gamification')} label="Vương Quốc Thú Cưng" icon="🎁" />
                                <SidebarButton active={activeTab === 'relax'} onClick={() => setActiveTab('relax')} label="Vườn Thư Giãn" icon="🧩" />
                                <SidebarButton active={activeTab === 'future'} onClick={() => setActiveTab('future')} label="Thư Gửi Ong Tương Lai" icon="✉️" />
                                <SidebarButton active={activeTab === 'analytics'} onClick={() => setActiveTab('analytics')} label="Ký Sự Làm Mật" icon="📊" />
                            </nav>
                        </div>

                        <div className="text-center text-[11px] text-slate-900 font-bold bg-white/40 py-2 rounded-xl border border-slate-900">
                            Chăm chỉ gom mật tri thức! 🌻
                        </div>
                    </aside>

                    {/* MOBILE TOP BAR */}
                    <div className="md:hidden bg-yellow-300 border-b-4 border-slate-900 px-4 py-3 flex items-center justify-between z-40 shadow-md">
                        <div className="flex items-center gap-2">
                            <span className="text-2xl animate-buzz">🐝</span>
                            <span className="font-extrabold text-slate-900 fun-font text-lg">BeeBee</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="text-xs font-bold bg-white border-2 border-slate-900 px-2.5 py-1 rounded-full">
                                {selectedPet.emoji} {currentLevel} Lvl | 💰{coins}
                            </span>
                        </div>
                    </div>

                    {/* MAIN CONTENT PORT */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 pb-24 md:pb-8 z-10">
                        {activeTab === 'home' && (
                            <HomeTab 
                                quote={currentQuote} 
                                changeQuote={() => setCurrentQuote(MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)])}
                                studyHours={studyHoursToday}
                                tasks={tasks}
                                setTasks={setTasks}
                                streak={streak}
                                setStreak={setStreak}
                                selectedPet={selectedPet}
                                petName={petName}
                                triggerToast={triggerToast}
                                gainRewards={gainRewards}
                                challenges={challenges}
                                setChallenges={setChallenges}
                            />
                        )}

                        {activeTab === 'planner' && (
                            <PlannerTab 
                                tasks={tasks} 
                                setTasks={setTasks} 
                                gainRewards={gainRewards}
                                triggerToast={triggerToast}
                            />
                        )}

                        {activeTab === 'pomodoro' && (
                            <PomodoroTab 
                                garden={garden}
                                setGarden={setGarden}
                                selectedPlant={selectedPlant}
                                setSelectedPlant={setSelectedPlant}
                                gainRewards={gainRewards}
                                triggerToast={triggerToast}
                                studyHoursToday={studyHoursToday}
                                setStudyHoursToday={setStudyHoursToday}
                            />
                        )}

                        {activeTab === 'ai' && (
                            <AiTab 
                                aiChat={aiChat}
                                aiQuery={aiQuery}
                                setAiQuery={setAiQuery}
                                handleAskAI={handleAskAI}
                                isAiLoading={isAiLoading}
                            />
                        )}

                        {activeTab === 'friends' && (
                            <FriendsTab 
                                rooms={rooms} 
                                setRooms={setRooms}
                                triggerToast={triggerToast}
                            />
                        )}

                        {activeTab === 'gamification' && (
                            <GamificationTab 
                                coins={coins}
                                setCoins={setCoins}
                                selectedPet={selectedPet}
                                setSelectedPet={setSelectedPet}
                                petName={petName}
                                setPetName={setPetName}
                                triggerToast={triggerToast}
                                xp={xp}
                                setXp={setXp}
                            />
                        )}

                        {activeTab === 'relax' && (
                            <RelaxTab 
                                coins={coins}
                                setCoins={setCoins}
                                xp={xp}
                                setXp={setXp}
                                triggerToast={triggerToast}
                                gainRewards={gainRewards}
                            />
                        )}

                        {activeTab === 'future' && (
                            <FutureTab 
                                savedLetters={savedLetters}
                                setSavedLetters={setSavedLetters}
                                triggerToast={triggerToast}
                            />
                        )}

                        {activeTab === 'analytics' && (
                            <AnalyticsTab 
                                tasks={tasks}
                                journals={journals}
                                setJournals={setJournals}
                                studyHoursToday={studyHoursToday}
                                gardenLength={garden.length}
                                triggerToast={triggerToast}
                            />
                        )}
                    </main>

                    {/* BOTTOM NAV FOR MOBILE */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-yellow-300 border-t-4 border-slate-900 flex justify-around py-2 px-1 z-40 shadow-lg overflow-x-auto">
                        <MobileNavButton active={activeTab === 'home'} onClick={() => setActiveTab('home')} icon="🏠" label="Tổ ong" />
                        <MobileNavButton active={activeTab === 'planner'} onClick={() => setActiveTab('planner')} icon="📝" label="Mật ngọt" />
                        <MobileNavButton active={activeTab === 'pomodoro'} onClick={() => setActiveTab('pomodoro')} icon="🌸" label="Vườn hoa" />
                        <MobileNavButton active={activeTab === 'ai'} onClick={() => setActiveTab('ai')} icon="🔮" label="Ong chúa" />
                        <MobileNavButton active={activeTab === 'friends'} onClick={() => setActiveTab('friends')} icon="👥" label="Nhóm" />
                        <MobileNavButton active={activeTab === 'gamification'} onClick={() => setActiveTab('gamification')} icon="🎁" label="Thú" />
                        <MobileNavButton active={activeTab === 'relax'} onClick={() => setActiveTab('relax')} icon="🧩" label="Giải trí" />
                        <MobileNavButton active={activeTab === 'future'} onClick={() => setActiveTab('future')} icon="✉️" label="Tương lai" />
                        <MobileNavButton active={activeTab === 'analytics'} onClick={() => setActiveTab('analytics')} icon="📊" label="Ký sự" />
                    </nav>
                </div>
            );
        };

        // --- SIDEBAR NAV BUTTON ---
        const SidebarButton = ({ active, onClick, label, icon }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center gap-3.5 px-4 py-2 rounded-2xl text-xs font-black transition-all border-2 ${active ? 'bg-slate-900 text-white border-slate-900 shadow-md scale-105' : 'text-slate-800 border-transparent hover:bg-white/50'}`}
            >
                <span className="text-base">{icon}</span>
                <span>{label}</span>
            </button>
        );

        // --- MOBILE NAV BUTTON ---
        const MobileNavButton = ({ active, onClick, icon, label }) => (
            <button 
                onClick={onClick}
                className={`flex flex-col items-center justify-center min-w-[55px] flex-1 transition-all ${active ? 'text-slate-950 scale-110 font-bold' : 'text-slate-700 font-semibold'}`}
            >
                <span className="text-lg">{icon}</span>
                <span className="text-[9px] mt-0.5 whitespace-nowrap">{label}</span>
            </button>
        );

        // --- 1. HOME TAB COMPONENT (TỔ ONG NGỌT NGÀO VỚI BẢNG ĐIỂM DANH 21 NGÀY XÂY TỔ) ---
        const HomeTab = ({ quote, changeQuote, studyHours, tasks, setTasks, streak, setStreak, selectedPet, petName, triggerToast, gainRewards, challenges, setChallenges }) => {
            const completedCount = tasks.filter(t => t.completed).length;
            const incompleteTasks = tasks.filter(t => !t.completed);
            const percentage = tasks.length ? Math.round((completedCount / tasks.length) * 100) : 0;

            const toggleComplete = (id) => {
                setTasks(tasks.map(task => {
                    if (task.id === id) {
                        const nextState = !task.completed;
                        if (nextState) {
                            gainRewards(30, 15);
                            triggerToast("🎉 Thu hoạch nhị hoa thành công! Nhận +30 XP, +15 Mật ngọt!");
                        }
                        return { ...task, completed: nextState };
                    }
                    return task;
                }));
            };

            // Điểm danh hằng ngày xây tổ
            const handleDayCheckIn = (dayNum) => {
                const targetDay = challenges.find(c => c.day === dayNum);
                if (targetDay && targetDay.checked) {
                    triggerToast(`Ong vàng đã điểm danh Ngày ${dayNum} rồi nhé!`, "info");
                    return;
                }

                const previousUnchecked = challenges.filter(c => c.day < dayNum && !c.checked);
                if (previousUnchecked.length > 0) {
                    triggerToast(`Vui lòng điểm danh lần lượt từ Ngày ${previousUnchecked[0].day} trước nhé!`, "info");
                    return;
                }

                setChallenges(challenges.map(c => c.day === dayNum ? { ...c, checked: true } : c));
                setStreak(prev => prev + 1);
                gainRewards(50, 25);
                triggerToast(`🐝 Điểm danh Ngày ${dayNum} xây tổ thành công! Nhận 50 XP và 25 Mật ngọt!`);
            };

            const highPriorityIncomplete = tasks.filter(t => !t.completed && t.priority === 'high');

            return (
                <div className="space-y-6 max-w-5xl mx-auto animate-fade-in">
                    {/* Header bar */}
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                        <div>
                            <h2 className="text-2xl font-black text-slate-900 fun-font">Tổ Ong Ngọt Ngào 🏡</h2>
                            <p className="text-slate-500 text-xs font-bold mt-1">Cánh cổng biến những giờ học khô khan thành hành trình thu hoạch mật ngọt mật hoa tri thức!</p>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="text-sm font-bold bg-yellow-100 border-2 border-slate-900 px-3 py-1.5 rounded-full shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]">
                                Chuỗi gom mật: 🔥 {streak} ngày liên tiếp
                            </span>
                        </div>
                    </div>

                    {/* BẢNG ĐIỂM DANH 21 NGÀY XÂY TỔ */}
                    <div className="bg-white border-4 border-slate-900 rounded-3xl p-6 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-2">
                            <div>
                                <h3 className="font-extrabold text-slate-900 text-base fun-font flex items-center gap-2">
                                    <span>📅</span> 21 Ngày Chăm Chỉ Xây Tổ Ong
                                </h3>
                                <p className="text-xs text-slate-500 font-bold mt-0.5">Xây dựng thói quen kiên trì không lùi bước. Nhấn chọn ngày tiếp theo để thụ phấn điểm danh!</p>
                            </div>
                            <span className="text-xs font-black bg-yellow-100 border-2 border-slate-900 px-3 py-1.5 rounded-xl self-start">
                                Đã xây: {challenges.filter(c => c.checked).length}/21 ngày 🏆
                            </span>
                        </div>

                        {/* Grid 21 ngày */}
                        <div className="grid grid-cols-3 sm:grid-cols-7 gap-3 mt-4">
                            {challenges.map(item => {
                                const isNextToUnlock = challenges.filter(c => c.day < item.day && !c.checked).length === 0 && !item.checked;
                                return (
                                    <button
                                        key={item.day}
                                        onClick={() => handleDayCheckIn(item.day)}
                                        className={`p-3 rounded-2xl border-2 border-slate-900 flex flex-col items-center justify-center transition-all ${
                                            item.checked 
                                            ? 'bg-amber-300 text-slate-900 shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]' 
                                            : isNextToUnlock 
                                            ? 'bg-yellow-200 hover:bg-yellow-300 scale-105 border-dashed shadow-[3px_3px_0px_0px_rgba(15,23,42,1)] animate-pulse'
                                            : 'bg-slate-50 text-slate-400 hover:bg-slate-100'
                                        }`}
                                    >
                                        <span className="text-xs font-extrabold">Ngày {item.day}</span>
                                        <span className="text-lg mt-1">
                                            {item.checked ? '🍯' : isNextToUnlock ? '🌸' : '🔒'}
                                        </span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* NHẮC NHỞ KHẨN CẤP KHU VỰC CẦN HÚT MẬT GẤP */}
                    <div className="bg-rose-100 border-4 border-slate-900 rounded-3xl p-5 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                        <h3 className="font-extrabold text-rose-800 flex items-center gap-2 text-md">
                            <span>🚨</span> Khu Vực Cần Hút Mật Gấp (Ưu Tiên Cao)
                        </h3>
                        {highPriorityIncomplete.length > 0 ? (
                            <div className="mt-3 space-y-2">
                                {highPriorityIncomplete.map(task => (
                                    <div key={task.id} className="bg-white p-3 rounded-2xl border-2 border-rose-300 flex justify-between items-center text-xs">
                                        <div className="font-bold text-slate-800">
                                            ⏰ <span className="text-rose-600 font-black">ƯU TIÊN CAO:</span> {task.subject} - {task.content} ({task.time} ngày {task.date})
                                        </div>
                                        <button 
                                            onClick={() => toggleComplete(task.id)}
                                            className="bg-amber-400 hover:bg-amber-500 text-slate-900 border-2 border-slate-950 px-3 py-1 rounded-xl font-bold transition-all"
                                        >
                                            Xong ngay! ✓
                                        </button>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <p className="text-xs text-rose-700 font-bold mt-1">Hiện tại không có nhị hoa ưu tiên cao nào bị bỏ quên. Bạn làm tốt lắm! 🌸</p>
                        )}
                    </div>

                    {/* Quote & Quick stats */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Motivation Card */}
                        <div className="lg:col-span-2 bg-gradient-to-br from-yellow-300 via-amber-400 to-orange-400 border-4 border-slate-900 rounded-3xl p-6 text-slate-900 relative overflow-hidden shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] min-h-[180px] flex flex-col justify-between">
                            <div className="absolute top-0 right-0 p-8 text-9xl text-white/20 font-black select-none pointer-events-none">“</div>
                            <div>
                                <span className="bg-white/30 text-slate-900 border border-slate-900/40 text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Mật Ngọt Động Lực 🍯</span>
                                <p className="text-base font-black leading-relaxed mt-4 fun-font">"{quote}"</p>
                            </div>
                            <div className="flex items-center justify-between mt-4 z-10">
                                <span className="text-[10px] text-slate-700 font-bold">Châm ngôn kích hoạt đôi cánh siêng năng</span>
                                <button onClick={changeQuote} className="text-xs bg-white hover:bg-yellow-100 border-2 border-slate-900 px-3 py-1.5 rounded-xl font-black transition-all shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]">Đổi câu khác 🔄</button>
                            </div>
                        </div>

                        {/* Fast Stats */}
                        <div className="bg-emerald-100 border-4 border-slate-900 rounded-3xl p-6 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] flex flex-col justify-between">
                            <h3 className="font-bold text-slate-800 text-xs uppercase tracking-wider">Thời gian bay gom mật hôm nay</h3>
                            <div className="my-3 flex items-baseline gap-2">
                                <span className="text-5xl font-black text-slate-900 font-mono tracking-tight">{studyHours}</span>
                                <span className="text-lg font-bold text-slate-600">Giờ</span>
                            </div>
                            <div className="bg-emerald-200 border-2 border-slate-900 text-slate-800 p-3 rounded-2xl text-[11px] font-bold">
                                🍀 Bạn học rất siêng năng! Thú cưng BeeBee đang ríu rít cổ vũ bạn đó!
                            </div>
                        </div>
                    </div>

                    {/* TIẾN ĐỘ VÀ CHI TIẾT CÁC NHIỆM VỤ CHƯA HOÀN THÀNH */}
                    <div className="bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                        <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-2">
                            <h3 className="font-extrabold text-slate-900 text-lg fun-font">Tiến độ gom mật ngọt trong ngày</h3>
                            <span className="text-sm font-black text-emerald-600 bg-emerald-50 border-2 border-emerald-400 px-3 py-1 rounded-full">{percentage}% Thụ Phấn</span>
                        </div>
                        <div className="w-full bg-slate-100 h-5 rounded-full overflow-hidden border-2 border-slate-900">
                            <div className="bg-gradient-to-r from-yellow-400 via-amber-400 to-orange-400 h-full transition-all duration-700" style={{ width: `${percentage}%` }}></div>
                        </div>

                        {/* Liệt kê rõ các nhiệm vụ chưa hoàn thành */}
                        <div className="mt-6 border-t border-slate-100 pt-4">
                            <h4 className="font-bold text-xs text-slate-500 uppercase tracking-widest mb-3">Nhị hoa chưa hút mật ({incompleteTasks.length}):</h4>
                            {incompleteTasks.length > 0 ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {incompleteTasks.map(task => (
                                        <div key={task.id} className="p-3.5 bg-yellow-50 rounded-2xl border-2 border-slate-900 flex justify-between items-start gap-2 shadow-[2px_2px_0px_0px_rgba(15,23,42,1)] animate-fade-in">
                                            <div>
                                                <span className="text-[10px] font-extrabold bg-amber-100 text-amber-900 px-2.5 py-0.5 rounded-full border border-amber-200 mr-2">{task.subject}</span>
                                                <span className={`text-[10px] font-extrabold px-2.5 py-0.5 rounded-full border ${task.priority === 'high' ? 'bg-rose-100 text-rose-800 border-rose-200' : 'bg-yellow-100 text-yellow-800 border-yellow-200'}`}>
                                                    {task.priority === 'high' ? 'Khẩn cấp' : 'Thường'}
                                                </span>
                                                <p className="text-xs font-bold text-slate-800 mt-2">{task.content}</p>
                                                <span className="text-[10px] text-slate-500 block mt-1">🕒 Dự định bay: {task.time} ({task.date})</span>
                                            </div>
                                            <button 
                                                onClick={() => toggleComplete(task.id)}
                                                className="bg-white hover:bg-emerald-100 border-2 border-slate-900 p-1.5 rounded-xl text-md transition-all flex-shrink-0"
                                                title="Đánh dấu hoàn thành"
                                            >
                                                ✓
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center py-6 bg-green-50 rounded-2xl border-2 border-dashed border-green-300">
                                    <span className="text-3xl">🥳</span>
                                    <p className="text-xs font-bold text-green-700 mt-1">Hôm nay đàn ong đã chăm chỉ hút hết mật hoa ngọt lành rồi! Cực kỳ đáng khen ngợi!</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Pet View */}
                    <div className="bg-amber-100/50 border-4 border-slate-900 rounded-3xl p-6 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] flex flex-col md:flex-row items-center gap-6">
                        <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center text-6xl shadow-inner border-2 border-slate-900 animate-bounce-slow">
                            {selectedPet.emoji}
                        </div>
                        <div>
                            <h3 className="font-extrabold text-slate-900 text-lg fun-font">{petName} đang vẫy cánh chờ bạn học bài!</h3>
                            <p className="text-xs text-slate-600 font-bold mt-1 leading-relaxed">
                                {selectedPet.desc} Mỗi nhị hoa ngọt lành con gặt hái được đều sẽ chuyển thành hạt năng lượng để em ấy lớn khôn khỏe mạnh mỗi ngày nhé!
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 2. PLANNER & TO-DO TAB (MẬT NGỌT CÔNG VIỆC) ---
        const PlannerTab = ({ tasks, setTasks, gainRewards, triggerToast }) => {
            const [subject, setSubject] = React.useState('');
            const [content, setContent] = React.useState('');
            const [date, setDate] = React.useState('');
            const [time, setTime] = React.useState('');
            const [priority, setPriority] = React.useState('medium');

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!subject || !content || !date || !time) {
                    triggerToast("Hãy điền đầy đủ nhị hoa tri thức muốn gieo nhé!", "info");
                    return;
                }

                const newTask = {
                    id: Date.now(),
                    subject,
                    content,
                    date,
                    time,
                    priority,
                    completed: false
                };

                setTasks([newTask, ...tasks]);
                gainRewards(15, 8);
                setSubject('');
                setContent('');
                setDate('');
                setTime('');
                triggerToast("Gieo hạt mầm nhị hoa thành công! +15 XP 🎒");
            };

            const toggleComplete = (id) => {
                setTasks(tasks.map(task => {
                    if (task.id === id) {
                        const nextState = !task.completed;
                        if (nextState) {
                            gainRewards(30, 15);
                            triggerToast("Ong vàng tuyệt vời! Gom mật thành công! +30 XP!");
                        }
                        return { ...task, completed: nextState };
                    }
                    return task;
                }));
            };

            const deleteTask = (id) => {
                setTasks(tasks.filter(task => task.id !== id));
                triggerToast("Đã nhổ mầm nhị hoa này khỏi lịch.", "info");
            };

            const priorityBadge = (p) => {
                if (p === 'high') return <span className="bg-rose-100 text-rose-800 border-2 border-slate-900 text-[10px] font-extrabold px-3 py-1 rounded-full">Khẩn cấp 🚨</span>;
                if (p === 'medium') return <span className="bg-amber-100 text-amber-800 border-2 border-slate-900 text-[10px] font-extrabold px-3 py-1 rounded-full">Trung bình ✏️</span>;
                return <span className="bg-emerald-100 text-emerald-800 border-2 border-slate-900 text-[10px] font-extrabold px-3 py-1 rounded-full">Nhẹ nhàng 🍃</span>;
            };

            return (
                <div className="max-w-5xl mx-auto space-y-6 animate-fade-in">
                    <h2 className="text-2xl font-black text-slate-900 fun-font">Mật Ngọt Công Việc & Kế Hoạch 📅</h2>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Form add task */}
                        <div className="bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] h-fit">
                            <h3 className="font-extrabold text-slate-800 text-md mb-4 flex items-center gap-2">
                                <span>🎒</span> Lên kế hoạch gieo mật
                            </h3>
                            <form onSubmit={handleAddTask} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Môn học / Dự án</label>
                                    <input 
                                        type="text" 
                                        placeholder="Ví dụ: Triết học, Thiết kế đồ họa..." 
                                        value={subject}
                                        onChange={e => setSubject(e.target.value)}
                                        className="w-full px-4 py-3 rounded-2xl border-2 border-slate-900 focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm font-bold bg-amber-50/20"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Nội dung thụ phấn chi tiết</label>
                                    <textarea 
                                        placeholder="Đọc 20 trang sách, giải hết 5 bài tập về nhà..." 
                                        value={content}
                                        onChange={e => setContent(e.target.value)}
                                        className="w-full px-4 py-3 rounded-2xl border-2 border-slate-900 focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm font-bold bg-amber-50/20 h-20 resize-none"
                                    />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Ngày gom mật</label>
                                        <input 
                                            type="date" 
                                            value={date}
                                            onChange={e => setDate(e.target.value)}
                                            className="w-full px-3 py-2 border-2 border-slate-900 rounded-2xl text-xs font-bold text-slate-600"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Khung giờ bay</label>
                                        <input 
                                            type="time" 
                                            value={time}
                                            onChange={e => setTime(e.target.value)}
                                            className="w-full px-3 py-2 border-2 border-slate-900 rounded-2xl text-xs font-bold text-slate-600"
                                        />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Độ gấp rút của nhị hoa</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['low', 'medium', 'high'].map(p => (
                                            <button
                                                key={p}
                                                type="button"
                                                onClick={() => setPriority(p)}
                                                className={`py-2 rounded-xl text-xs font-extrabold capitalize border-2 border-slate-950 transition-all ${priority === p ? 'bg-amber-400 text-slate-900 shadow-[2px_2px_0px_0px_rgba(15,23,42,1)] scale-105' : 'bg-white text-slate-600 hover:bg-slate-50'}`}
                                            >
                                                {p === 'low' ? 'Thấp' : p === 'medium' ? 'Vừa' : 'Cao'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <button
                                    type="submit"
                                    className="w-full bg-yellow-400 hover:bg-yellow-500 border-4 border-slate-900 text-slate-955 font-black py-3 rounded-2xl transition-all shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] hover:scale-[1.02]"
                                >
                                    Khởi tạo nhị hoa mới 🌸
                                </button>
                            </form>
                        </div>

                        {/* Task list Display */}
                        <div className="lg:col-span-2 space-y-4">
                            <div className="flex items-center justify-between">
                                <h3 className="font-extrabold text-slate-800 text-md">Danh sách các nhị hoa tri thức</h3>
                                <span className="text-xs bg-slate-200 border-2 border-slate-900 font-extrabold px-3 py-1 rounded-full">Tổng số: {tasks.length}</span>
                            </div>

                            <div className="space-y-3.5 max-h-[550px] overflow-y-auto custom-scrollbar pr-1">
                                {tasks.length === 0 ? (
                                    <div className="bg-white rounded-3xl p-10 border-4 border-slate-900 text-center text-slate-400 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                                        🏖️ Chưa có nhị hoa nào được trồng. Con hãy gieo một nhị hoa gom mật bên cạnh nha!
                                    </div>
                                ) : (
                                    tasks.map(task => (
                                        <div 
                                            key={task.id} 
                                            className={`p-5 rounded-3xl border-4 border-slate-900 bg-white shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] flex items-start gap-4 transition-all ${task.completed ? 'opacity-65 bg-slate-50/50' : 'hover:shadow-md'}`}
                                        >
                                            {/* Checkbox hoàn thành nhiệm vụ */}
                                            <button 
                                                onClick={() => toggleComplete(task.id)}
                                                className={`w-8 h-8 rounded-xl border-3 border-slate-900 flex items-center justify-center flex-shrink-0 transition-all ${task.completed ? 'bg-amber-400 text-slate-950 shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]' : 'bg-slate-50 hover:bg-yellow-100 shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]'}`}
                                            >
                                                {task.completed && <span className="font-black text-lg">✓</span>}
                                            </button>

                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center gap-2 flex-wrap mb-1">
                                                    <span className="font-extrabold text-sm text-indigo-600">{task.subject}</span>
                                                    {priorityBadge(task.priority)}
                                                </div>
                                                <p className={`text-sm font-bold text-slate-800 ${task.completed ? 'line-through text-slate-400' : ''}`}>
                                                    {task.content}
                                                </p>
                                                <span className="text-[11px] text-slate-500 font-bold block mt-2">
                                                    🕒 Giờ gom mật: {task.time} ngày {task.date}
                                                </span>
                                            </div>

                                            <button 
                                                onClick={() => deleteTask(task.id)}
                                                className="text-slate-400 hover:text-rose-500 transition-colors p-1"
                                                title="Xóa công việc"
                                            >
                                                🗑️
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 3. POMODORO TIMER & GARDEN TAB (VƯỜN HOA HÚT MẬT VỚI ĐỒNG HỒ CÓ THỂ ĐIỀU CHỈNH) ---
        const PomodoroTab = ({ garden, setGarden, selectedPlant, setSelectedPlant, gainRewards, triggerToast, studyHoursToday, setStudyHoursToday }) => {
            const [customWorkMin, setCustomWorkMin] = React.useState(25);
            const [customBreakMin, setCustomBreakMin] = React.useState(5);
            
            const [minutes, setMinutes] = React.useState(25);
            const [seconds, setSeconds] = React.useState(0);
            const [isActive, setIsActive] = React.useState(false);
            const [isBreak, setIsBreak] = React.useState(false);
            const [activeSound, setActiveSound] = React.useState('none');
            const [tempCanceled, setTempCanceled] = React.useState(false);

            React.useEffect(() => {
                if (!isActive) {
                    setMinutes(isBreak ? customBreakMin : customWorkMin);
                    setSeconds(0);
                }
            }, [customWorkMin, customBreakMin, isBreak, isActive]);

            React.useEffect(() => {
                let interval = null;
                if (isActive) {
                    interval = setInterval(() => {
                        if (seconds === 0) {
                            if (minutes === 0) {
                                clearInterval(interval);
                                setIsActive(false);
                                if (!isBreak) {
                                    // Hoàn thành ca bay hút mật
                                    gainRewards(120, 60);
                                    setGarden([...garden, selectedPlant.emoji]);
                                    setStudyHoursToday(prev => Number((prev + (customWorkMin / 60)).toFixed(2)));
                                    triggerToast(`🎉 Ca hút mật kết thúc tốt đẹp! Bạn nhận được +120 XP, +60 Mật ngọt và gieo trồng thành công một đoá ${selectedPlant.name}!`);
                                    setIsBreak(true);
                                    setMinutes(customBreakMin);
                                } else {
                                    triggerToast("Nghỉ ngơi nạp đủ mật hoa rồi, bầy ong hãy bắt đầu ca gom mật tiếp theo nào! 🔥", "info");
                                    setIsBreak(false);
                                    setMinutes(customWorkMin);
                                }
                            } else {
                                setMinutes(minutes - 1);
                                setSeconds(59);
                            }
                        } else {
                            setSeconds(seconds - 1);
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isActive, minutes, seconds, isBreak, selectedPlant, garden, customWorkMin, customBreakMin]);

            const handleToggle = () => {
                if (!isActive) {
                    setTempCanceled(false);
                }
                setIsActive(!isActive);
            };

            const handleReset = () => {
                setIsActive(false);
                setMinutes(isBreak ? customBreakMin : customWorkMin);
                setSeconds(0);
                if (!isBreak) {
                    setTempCanceled(true);
                    triggerToast("Bạn dừng ca hút mật giữa chừng khiến đoá hoa non bị héo úa một chút. Hãy cố gắng ca tới nha! 🥀", "info");
                }
            };

            const handleSoundChange = (e) => {
                const trackId = e.target.value;
                setActiveSound(trackId);
                if (trackId === 'none') {
                    stopFocusSound();
                } else {
                    startFocusSound(trackId);
                }
            };

            React.useEffect(() => {
                return () => {
                    stopFocusSound();
                };
            }, []);

            return (
                <div className="max-w-5xl mx-auto space-y-6 animate-fade-in">
                    <h2 className="text-2xl font-black text-slate-900 fun-font">Vườn Hoa Hút Mật & Pomodoro ⏱️</h2>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Timer main */}
                        <div className="lg:col-span-2 bg-white rounded-3xl p-8 border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] flex flex-col items-center justify-center text-center">
                            
                            {/* KHU VỰC ĐIỀU CHỈNH THỜI GIAN THEO Ý MUỐN */}
                            <div className="w-full max-w-md bg-yellow-50/60 p-4 rounded-2xl border-2 border-slate-900 mb-6 flex items-center justify-around">
                                <div className="flex flex-col items-center">
                                    <span className="text-xs font-black text-slate-600 mb-1">⏱️ CA HÚT MẬT</span>
                                    <div className="flex items-center gap-1.5">
                                        <button 
                                            disabled={isActive}
                                            onClick={() => setCustomWorkMin(prev => Math.max(1, prev - 5))}
                                            className="w-8 h-8 rounded-lg bg-white border-2 border-slate-900 font-black text-sm hover:bg-yellow-100 disabled:opacity-40"
                                        >
                                            -
                                        </button>
                                        <span className="text-base font-extrabold w-10">{customWorkMin}p</span>
                                        <button 
                                            disabled={isActive}
                                            onClick={() => setCustomWorkMin(prev => Math.min(120, prev + 5))}
                                            className="w-8 h-8 rounded-lg bg-white border-2 border-slate-900 font-black text-sm hover:bg-yellow-100 disabled:opacity-40"
                                        >
                                            +
                                        </button>
                                    </div>
                                </div>

                                <div className="w-0.5 h-10 bg-slate-300"></div>

                                <div className="flex flex-col items-center">
                                    <span className="text-xs font-black text-slate-600 mb-1">💆 THỜI GIAN NGHỈ</span>
                                    <div className="flex items-center gap-1.5">
                                        <button 
                                            disabled={isActive}
                                            onClick={() => setCustomBreakMin(prev => Math.max(1, prev - 1))}
                                            className="w-8 h-8 rounded-lg bg-white border-2 border-slate-900 font-black text-sm hover:bg-yellow-100 disabled:opacity-40"
                                        >
                                            -
                                        </button>
                                        <span className="text-base font-extrabold w-10">{customBreakMin}p</span>
                                        <button 
                                            disabled={isActive}
                                            onClick={() => setCustomBreakMin(prev => Math.min(30, prev + 1))}
                                            className="w-8 h-8 rounded-lg bg-white border-2 border-slate-900 font-black text-sm hover:bg-yellow-100 disabled:opacity-40"
                                        >
                                            +
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <span className="bg-yellow-100 border-2 border-slate-900 text-slate-900 font-extrabold text-xs uppercase px-4 py-1.5 rounded-full mb-6">
                                {isBreak ? "💆 Giờ nghỉ thư giãn đôi cánh" : `🎯 Đang nuôi: ${selectedPlant.emoji} ${selectedPlant.name}`}
                            </span>

                            {/* Clock Graphic */}
                            <div className="w-56 h-56 rounded-full border-8 border-slate-900 flex flex-col items-center justify-center shadow-inner relative bg-amber-50">
                                {isActive && (
                                    <div className="absolute inset-0 rounded-full border-8 border-yellow-400 border-t-transparent animate-spin" style={{ animationDuration: '3s' }}></div>
                                )}
                                <span className="text-5xl font-black text-slate-900 font-mono">
                                    {String(minutes).padStart(2, '0')}:{String(seconds).padStart(2, '0')}
                                </span>
                                <span className="text-xs text-slate-500 font-bold mt-1">Phút : Giây</span>
                            </div>

                            {/* Tree selection panel */}
                            <div className="mt-6 w-full max-w-md bg-amber-50 p-4 rounded-2xl border-2 border-slate-900">
                                <label className="block text-xs font-bold text-slate-600 uppercase mb-2">Chọn loài hoa thơm muốn gieo hạt thụ phấn:</label>
                                <div className="flex justify-around">
                                    {AVAILABLE_PLANTS.map(p => (
                                        <button 
                                            key={p.id}
                                            onClick={() => {
                                                if(!isActive) {
                                                    setSelectedPlant(p);
                                                    triggerToast(`Gieo loài hoa: ${p.emoji} ${p.name}`);
                                                } else {
                                                    triggerToast("Ong vàng hãy tạm dừng ca hút mật trước khi thay đổi loài hoa gieo nhé!", "info");
                                                }
                                            }}
                                            className={`w-11 h-11 rounded-xl flex items-center justify-center text-2xl border-2 transition-all ${selectedPlant.id === p.id ? 'bg-yellow-300 border-slate-950 scale-110 shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]' : 'bg-white border-slate-300'}`}
                                            title={p.name}
                                        >
                                            {p.emoji}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Control button array */}
                            <div className="flex gap-4 mt-6 w-full max-w-sm">
                                <button
                                    onClick={handleToggle}
                                    className={`flex-1 py-3 rounded-2xl font-black text-sm border-2 border-slate-950 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] transition-all ${isActive ? 'bg-amber-400 hover:bg-amber-500' : 'bg-emerald-400 hover:bg-emerald-500'}`}
                                >
                                    {isActive ? "Tạm Dừng Ca ⏸️" : "Cất Cánh Gom Mật 🚀"}
                                </button>
                                <button
                                    onClick={handleReset}
                                    className="bg-slate-100 hover:bg-slate-200 border-2 border-slate-900 text-slate-700 font-bold px-6 py-3 rounded-2xl transition-all shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]"
                                >
                                    Hủy ca
                                </button>
                            </div>

                            {/* Audio options */}
                            <div className="mt-8 w-full max-w-md border-t-2 border-dashed pt-6 border-slate-200">
                                <label className="block text-xs font-extrabold text-slate-600 uppercase mb-3">🎧 Tiếng ồn trắng & Sóng não Alpha êm tai:</label>
                                <select 
                                    value={activeSound} 
                                    onChange={handleSoundChange}
                                    className="w-full px-4 py-3 rounded-2xl border-2 border-slate-900 focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm font-bold bg-amber-50 text-slate-800"
                                >
                                    <option value="none">Không phát âm thanh 🔇</option>
                                    <option value="rain">Tiếng Mưa Rào Rỉ Rả Thư Thái 🌧️</option>
                                    <option value="waves">Tiếng Sóng Biển Vỗ Rì Rào Du Dương 🌊</option>
                                    <option value="lofi">Nhạc Sóng Não Thư Giãn Alpha Gom Mật 🎵</option>
                                </select>
                            </div>
                        </div>

                        {/* Garden Sidebar */}
                        <div className="bg-white rounded-3xl p-6 border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] flex flex-col justify-between">
                            <div>
                                <h3 className="font-extrabold text-slate-800 text-lg fun-font flex items-center gap-2">
                                    <span>🏡</span> Vườn Hoa Thơm Ngọt
                                </h3>
                                <p className="text-xs text-slate-400 font-bold mt-1 mb-4">Khu vườn do chính đôi cánh và công sức tự học bền bỉ của bạn thụ phấn chăm bón.</p>
                                
                                {tempCanceled && (
                                    <div className="bg-rose-50 text-rose-600 border-2 border-rose-200 p-3 rounded-2xl text-xs mb-4 font-bold">
                                        🥀 Tiếc quá! Hạt mầm non đã héo rũ vì ca hút mật bị gãy gánh giữa đường.
                                    </div>
                                )}

                                <div className="grid grid-cols-4 gap-3 bg-amber-50/50 p-4 rounded-2xl border-2 border-slate-900 min-h-[160px]">
                                    {garden.map((item, idx) => (
                                        <div 
                                            key={idx} 
                                            className="aspect-square bg-white rounded-2xl flex items-center justify-center text-3xl shadow-[2px_2px_0px_0px_rgba(15,23,42,1)] border-2 border-slate-900 transform hover:scale-110 transition-transform cursor-pointer animate-fade-in"
                                            title="Đoá hoa nở rực rỡ"
                                        >
                                            {item}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="border-t-2 border-dashed border-slate-200 pt-4 mt-4">
                                <div className="flex justify-between text-xs font-bold text-slate-500 mb-2">
                                    <span>Độ rực rỡ của vườn:</span>
                                    <span>{garden.length} Đoá hoa ngọt</span>
                                </div>
                                <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden border-2 border-slate-900">
                                    <div className="bg-emerald-400 h-full" style={{ width: `${Math.min(100, garden.length * 10)}%` }}></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 4. AI STUDY ASSISTANT TAB (ONG CHÚA THÔNG THÁI) ---
        const AiTab = ({ aiChat, aiQuery, setAiQuery, handleAskAI, isAiLoading }) => {
            const chatEndRef = React.useRef(null);

            React.useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [aiChat]);

            return (
                <div className="max-w-4xl mx-auto space-y-6 animate-fade-in">
                    <div className="flex items-center justify-between">
                        <div>
                            <h2 className="text-2xl font-black text-slate-900 fun-font">Ong Chúa Thông Thái AI 🔮</h2>
                            <p className="text-xs text-slate-500 font-bold mt-1">Hỏi bài học, nhận mẹo Pomodoro và thời khóa biểu cực kỳ đắc lực từ Ong Chúa!</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] overflow-hidden flex flex-col h-[520px]">
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar bg-amber-50/10">
                            {aiChat.map((msg, idx) => (
                                <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] rounded-2xl p-4 text-sm leading-relaxed ${msg.role === 'user' ? 'bg-indigo-400 text-slate-900 font-extrabold rounded-tr-none border-2 border-slate-950' : 'bg-white text-slate-800 rounded-tl-none border-2 border-slate-950'}`}>
                                        <div className="font-extrabold text-[10px] uppercase opacity-70 mb-1.5">{msg.role === 'user' ? 'Bạn' : 'Ong Chúa 👑🐝'}</div>
                                        <p className="whitespace-pre-line font-medium">{msg.text}</p>
                                    </div>
                                </div>
                            ))}
                            {isAiLoading && (
                                <div className="flex justify-start">
                                    <div className="bg-white text-slate-500 rounded-2xl p-4 text-sm rounded-tl-none border-2 border-slate-900 flex items-center gap-2">
                                        <div className="w-2.5 h-2.5 bg-yellow-400 rounded-full animate-bounce"></div>
                                        <div className="w-2.5 h-2.5 bg-yellow-400 rounded-full animate-bounce" style={{ animationDelay: '0.2s' }}></div>
                                        <div className="w-2.5 h-2.5 bg-yellow-400 rounded-full animate-bounce" style={{ animationDelay: '0.4s' }}></div>
                                        <span className="font-bold text-xs ml-2">Ong Chúa đang chiêm nghiệm kiến thức...</span>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        <form onSubmit={handleAskAI} className="border-t-4 border-slate-900 p-4 bg-yellow-100 flex gap-3">
                            <input
                                type="text"
                                placeholder="Gõ câu hỏi để thỉnh giáo Ong Chúa Trí Tuệ..."
                                value={aiQuery}
                                onChange={e => setAiQuery(e.target.value)}
                                className="flex-1 px-4 py-3 rounded-2xl border-2 border-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-bold bg-white"
                                disabled={isAiLoading}
                            />
                            <button
                                type="submit"
                                className="bg-indigo-400 hover:bg-indigo-500 text-slate-955 border-2 border-slate-900 font-black px-6 py-3 rounded-2xl transition-all shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]"
                                disabled={isAiLoading}
                            >
                                Hỏi bài 📤
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- 5. SOCIAL / FRIENDS TAB (PHÒNG MẬT NHÓM) ---
        const FriendsTab = ({ rooms, setRooms, triggerToast }) => {
            const [newRoomName, setNewRoomName] = React.useState('');

            const handleCreateRoom = (e) => {
                e.preventDefault();
                if (!newRoomName.trim()) {
                    triggerToast("Con hãy nhập tên phòng tự học thật ngọt ngào nhé!", "info");
                    return;
                }
                const randomCode = `BEE-${Math.floor(100 + Math.random() * 900)}`;
                const newRoom = {
                    id: Date.now(),
                    name: `${newRoomName} 🍯`,
                    creator: 'Bạn',
                    activeUsers: 1,
                    isJoined: true,
