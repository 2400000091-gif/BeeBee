                    code: randomCode
                };
                setRooms([newRoom, ...rooms]);
                setNewRoomName('');
                triggerToast(`🎉 Phòng mật nhóm "${newRoomName}" đã được khánh thành!`);
            };

            const handleJoinRoom = (roomId) => {
                setRooms(rooms.map(room => {
                    if (room.id === roomId) {
                        const state = !room.isJoined;
                        if (state) {
                            triggerToast(`Đã bay vào phòng học: ${room.name}!`);
                        } else {
                            triggerToast("Đã rời phòng mật tự học.");
                        }
                        return { ...room, isJoined: state, activeUsers: state ? room.activeUsers + 1 : room.activeUsers - 1 };
                    }
                    return room;
                }));
            };

            const handleInviteFriend = (roomCode, roomName) => {
                const mockInviteLink = `https://beebee.com/join?code=${roomCode}`;
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = mockInviteLink;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                try {
                    document.execCommand('copy');
                    triggerToast(`🔗 Mã phòng mật nhóm "${roomName}": ${roomCode}! Đã copy link rủ bầy ong vào cùng học.`);
                } catch (err) {
                    triggerToast(`Mã mời bầy ong: ${roomCode}`);
                }
                document.body.removeChild(tempTextArea);
            };

            const topFriends = [
                { rank: 1, name: 'Nguyễn Văn Đạt', hours: 24.5, status: '✍️ Gom mật môn giải tích' },
                { rank: 2, name: 'Lê Thị Hạnh', hours: 21.8, status: '🎧 Nghe nhạc Lofi bay gom mật' },
                { rank: 3, name: 'Trần Minh Tuấn', hours: 19.4, status: '🌸 Đang trong ca Pomodoro' },
                { rank: 4, name: 'Bùi Khánh Linh', hours: 18.0, status: '📖 Đọc sớ giáo trình lý thuyết' },
                { rank: 5, name: 'Phạm Bảo Lâm', hours: 15.6, status: '😴 Nghỉ cánh dưỡng sức' },
                { rank: 6, name: 'Bạn (Hiện tại)', hours: 12.2, status: '⚡ Đang thụ phấn' },
                { rank: 7, name: 'Đỗ Anh Thư', hours: 11.5, status: '☕ Nhâm nhi mật hoa cafe' },
                { rank: 8, name: 'Hoàng Quốc Việt', hours: 10.0, status: '🎮 Hứng sao xả stress' },
                { rank: 9, name: 'Vũ Hải Đăng', hours: 9.2, status: '📝 Sản xuất mật ngọt To-do' },
                { rank: 10, name: 'Trịnh Thu Trang', hours: 8.5, status: '🦉 Gom mật thâu đêm' }
            ];

            return (
                <div className="max-w-5xl mx-auto space-y-6 animate-fade-in">
                    <h2 className="text-2xl font-black text-slate-900 fun-font">Phòng Mật Nhóm & Bạn Bè 👥</h2>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Create Room Form */}
                        <div className="bg-amber-100 p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] h-fit">
                            <h3 className="font-extrabold text-slate-900 text-md mb-2 flex items-center gap-2">
                                <span>🏫</span> Tự tạo Phòng Mật mới
                            </h3>
                            <p className="text-xs text-slate-600 font-bold mb-4">Lập một không gian thụ phấn mật thơm ngọt của riêng bạn để mời bầy ong xung quanh vào học tập cùng nhau.</p>
                            <form onSubmit={handleCreateRoom} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-700 uppercase mb-1.5">Tên phòng mật tự học:</label>
                                    <input 
                                        type="text" 
                                        placeholder="Ví dụ: Hội ong cày IELTS, Triết học không lùi..." 
                                        value={newRoomName}
                                        onChange={e => setNewRoomName(e.target.value)}
                                        className="w-full px-4 py-3 rounded-2xl border-2 border-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-bold bg-white"
                                    />
                                </div>
                                <button
                                    type="submit"
                                    className="w-full bg-indigo-400 hover:bg-indigo-500 text-slate-955 border-2 border-slate-900 font-black py-3 rounded-2xl transition-all shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]"
                                >
                                    Khởi tạo phòng mới ✨
                                </button>
                            </form>
                        </div>

                        {/* Room list and rankings */}
                        <div className="lg:col-span-2 space-y-6">
                            {/* Rooms list */}
                            <div className="space-y-4">
                                <h3 className="font-extrabold text-slate-800 text-md">Các phòng mật đang gom tri thức online</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {rooms.map(room => (
                                        <div key={room.id} className="bg-white rounded-3xl p-5 border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] flex flex-col justify-between">
                                            <div>
                                                <div className="flex justify-between items-start">
                                                    <h4 className="font-bold text-slate-800 text-sm leading-tight">{room.name}</h4>
                                                    <span className="text-[10px] font-extrabold bg-amber-100 border-2 border-slate-900 px-2.5 py-0.5 rounded-full">
                                                        Mã: {room.code}
                                                    </span>
                                                </div>
                                                <span className="text-xs font-bold text-slate-500 mt-2 block">👤 Trưởng bầy: {room.creator}</span>
                                                <span className="text-xs font-bold text-emerald-600 mt-1 block">👥 {room.activeUsers} ong đang thụ phấn chăm học</span>
                                            </div>
                                            
                                            <div className="flex gap-2 mt-4">
                                                <button
                                                    onClick={() => handleJoinRoom(room.id)}
                                                    className={`flex-1 py-2 rounded-xl font-bold text-xs border-2 transition-all ${room.isJoined ? 'bg-rose-100 text-rose-700 border-rose-300' : 'bg-green-400 border-slate-955 text-slate-900 shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]'}`}
                                                >
                                                    {room.isJoined ? "Rời Phòng 🚪" : "Vào Học Chung"}
                                                </button>
                                                
                                                <button
                                                    onClick={() => handleInviteFriend(room.code, room.name)}
                                                    className="bg-sky-200 hover:bg-sky-300 border-2 border-slate-900 text-slate-800 font-bold px-3 py-2 rounded-xl text-xs flex items-center justify-center gap-1 shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]"
                                                    title="Mời bầy ong thân yêu vào chung phòng"
                                                >
                                                    <span>Mời 👥</span>
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Leaderboard */}
                            <div className="bg-white rounded-3xl p-6 border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                                <h3 className="font-extrabold text-slate-800 text-md mb-4 flex items-center gap-2">
                                    <span>🏆</span> Bảng Xếp Hạng Top 10 Ong Chăm Chỉ Gom Mật
                                </h3>
                                <div className="space-y-3 max-h-[350px] overflow-y-auto custom-scrollbar pr-1">
                                    {topFriends.map(user => (
                                        <div key={user.rank} className={`flex items-center justify-between pb-3 border-b border-slate-100 last:border-0 last:pb-0 ${user.name.includes('Bạn') ? 'bg-yellow-50 p-2 rounded-xl border-2 border-yellow-300' : ''}`}>
                                            <div className="flex items-center gap-3">
                                                <span className={`w-7 h-7 rounded-lg flex items-center justify-center text-xs font-black border-2 border-slate-950 ${user.rank === 1 ? 'bg-yellow-300' : user.rank === 2 ? 'bg-slate-200' : user.rank === 3 ? 'bg-orange-200' : 'bg-white'}`}>
                                                    {user.rank}
                                                </span>
                                                <div>
                                                    <div className="font-bold text-slate-800 text-xs">{user.name}</div>
                                                    <span className="text-[10px] font-semibold text-blue-500">{user.status}</span>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <span className="font-extrabold text-sm text-slate-900">{user.hours}</span>
                                                <span className="text-[9px] text-slate-400 block font-bold uppercase">Giờ học</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 6. GAMIFICATION / PET SHOP TAB (VƯƠNG QUỐC THÚ CƯNG) ---
        const GamificationTab = ({ coins, setCoins, selectedPet, setSelectedPet, petName, setPetName, triggerToast, xp, setXp }) => {
            const [editNameMode, setEditNameMode] = React.useState(false);
            const [newNameInput, setNewNameInput] = React.useState(petName);

            // Trang phục thú cưng
            const [outfits, setOutfits] = React.useState([
                { id: 'hat', name: 'Mũ Cao Bồi 🤠', price: 40, owned: false },
                { id: 'glasses', name: 'Kính Học Giả 👓', price: 30, owned: false },
                { id: 'crown', name: 'Vương Miện Ong Chúa 👑', price: 80, owned: false }
            ]);
            const [equippedOutfit, setEquippedOutfit] = React.useState('none');

            // Avatar cá nhân tự tùy biến
            const [avatarHair, setAvatarHair] = React.useState('#2563eb');
            const [avatarShirt, setAvatarShirt] = React.useState('#cbd5e1');
            const [avatarAccessory, setAvatarAccessory] = React.useState('none');

            const handlePetSelect = (pet) => {
                setSelectedPet(pet);
                triggerToast(`Nhận thú cưng đồng hành mới: ${pet.name}!`);
            };

            const handleSaveName = (e) => {
                e.preventDefault();
                if(!newNameInput.trim()){
                    triggerToast("Tên thú cưng không được để trống!", "info");
                    return;
                }
                setPetName(newNameInput);
                setEditNameMode(false);
                triggerToast("Cập nhật biệt danh cho thú cưng thành công!");
            };

            const buyOutfit = (item) => {
                if (item.owned) {
                    setEquippedOutfit(equippedOutfit === item.id ? 'none' : item.id);
                    triggerToast(`Trang bị: ${item.name}`);
                    return;
                }
                if (coins < item.price) {
                    triggerToast("Bạn không đủ mật ngọt tích lũy rồi, hãy gom thêm nha!", "info");
                    return;
                }
                setCoins(prev => prev - item.price);
                setOutfits(outfits.map(o => o.id === item.id ? { ...o, owned: true } : o));
                setEquippedOutfit(item.id);
                triggerToast(`Đã sở hữu trang phục: ${item.name}!`);
            };

            return (
                <div className="max-w-5xl mx-auto space-y-6 animate-fade-in">
                    <h2 className="text-2xl font-black text-slate-900 fun-font">Vương Quốc Thú Cưng & Thiết Kế Avatar 👕</h2>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Current Companion State */}
                        <div className="bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] flex flex-col justify-between text-center relative">
                            <div>
                                <h3 className="font-extrabold text-slate-800 text-md mb-2">Thú Cưng Đồng Hành</h3>
                                <div className="w-32 h-32 mx-auto bg-amber-100 rounded-full flex items-center justify-center text-7xl shadow-inner border-2 border-slate-950 animate-bounce-slow mt-4 mb-4 relative">
                                    {selectedPet.emoji}
                                    {equippedOutfit !== 'none' && (
                                        <span className="absolute -top-3 -right-3 text-3xl">
                                            {equippedOutfit === 'hat' ? '🤠' : equippedOutfit === 'glasses' ? '👓' : '👑'}
                                        </span>
                                    )}
                                </div>
                                {editNameMode ? (
                                    <form onSubmit={handleSaveName} className="flex gap-2 justify-center items-center">
                                        <input 
                                            type="text" 
                                            value={newNameInput} 
                                            onChange={e => setNewNameInput(e.target.value)}
                                            className="border-2 border-slate-900 px-2 py-1 rounded-lg text-xs font-bold w-32 focus:ring-2 focus:ring-yellow-400"
                                        />
                                        <button type="submit" className="bg-emerald-400 border-2 border-slate-900 text-xs px-2.5 py-1 rounded-lg font-bold">Lưu</button>
                                    </form>
                                ) : (
                                    <div className="flex items-center justify-center gap-2">
                                        <h4 className="font-black text-lg text-slate-800 fun-font">{petName}</h4>
                                        <button onClick={() => setEditNameMode(true)} className="text-xs text-slate-400 hover:text-slate-800">✏️ Đổi tên</button>
                                    </div>
                                )}
                                <p className="text-xs text-slate-500 font-bold mt-2">{selectedPet.desc}</p>
                            </div>
                            
                            <div className="border-t border-slate-100 pt-4 mt-4 space-y-2">
                                <span className="text-[10px] text-slate-400 font-black block">Tủ quần áo thú cưng:</span>
                                <div className="grid grid-cols-3 gap-2">
                                    {outfits.map(item => (
                                        <button
                                            key={item.id}
                                            onClick={() => buyOutfit(item)}
                                            className={`p-1.5 border-2 border-slate-900 rounded-xl text-xs font-bold ${equippedOutfit === item.id ? 'bg-yellow-300' : 'bg-slate-50'}`}
                                        >
                                            {item.owned ? 'Equip' : `${item.price} 🪙`}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* List of Available Pets to Adopt */}
                        <div className="bg-white rounded-3xl p-6 border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                            <h3 className="font-extrabold text-slate-800 text-md mb-4">Nhận Nuôi Thú Cưng Mới</h3>
                            <div className="space-y-4">
                                {AVAILABLE_PETS.map(pet => (
                                    <div 
                                        key={pet.id} 
                                        className={`p-4 rounded-2xl border-2 flex items-center gap-4 transition-all ${selectedPet.id === pet.id ? 'bg-yellow-100 border-slate-900 shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]' : 'bg-slate-50 border-slate-200'}`}
                                    >
                                        <span className="text-5xl">{pet.emoji}</span>
                                        <div className="flex-1 min-w-0">
                                            <h4 className="font-bold text-slate-800 text-xs">{pet.name}</h4>
                                            <p className="text-[10px] text-slate-500 font-bold leading-normal mt-1">{pet.desc}</p>
                                            <button
                                                onClick={() => handlePetSelect(pet)}
                                                className={`mt-2 px-3 py-1.5 rounded-lg text-[10px] font-black border-2 transition-all ${selectedPet.id === pet.id ? 'bg-slate-900 text-white' : 'bg-white border-slate-900 text-slate-800 hover:bg-slate-100'}`}
                                            >
                                                {selectedPet.id === pet.id ? 'Đang đồng hành' : 'Nuôi em này'}
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Customize Avatar */}
                        <div className="bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                            <h3 className="font-extrabold text-slate-800 text-md mb-2">Tự Thiết Kế Avatar</h3>
                            <p className="text-xs text-slate-400 font-bold mb-4">Mua sắm phụ kiện cá nhân bằng Xu kiếm được qua học tập.</p>

                            {/* Live SVG Render */}
                            <div className="w-28 h-28 bg-slate-50 rounded-full border-2 border-slate-900 mx-auto flex items-center justify-center overflow-hidden mb-4 relative">
                                <svg className="w-20 h-20 mt-4" viewBox="0 0 100 100" fill="none">
                                    <circle cx="50" cy="45" r="22" fill="#fed7aa" />
                                    <circle cx="42" cy="42" r="3" fill="#1e293b" />
                                    <circle cx="58" cy="42" r="3" fill="#1e293b" />
                                    <path d="M28 40 C 28 15, 72 15, 72 40 Z" fill={avatarHair} />
                                    <path d="M25 80 C 25 65, 75 65, 75 80 L 75 100 L 25 100 Z" fill={avatarShirt} />
                                    {avatarAccessory === 'glasses' && (
                                        <g stroke="#1e293b" strokeWidth="2">
                                            <circle cx="42" cy="42" r="6" fill="none" />
                                            <circle cx="58" cy="42" r="6" fill="none" />
                                            <line x1="48" y1="42" x2="52" y2="42" />
                                        </g>
                                    )}
                                    {avatarAccessory === 'headphones' && (
                                        <path d="M24 45 C 24 25, 76 25, 76 45 C 76 45, 78 45, 78 50 L 74 50 L 74 45 C 74 27, 26 27, 26 45 L 26 50 L 22 50 Z" fill="#dc2626" />
                                    )}
                                </svg>
                            </div>

                            <div className="space-y-3 text-xs font-bold">
                                <div>
                                    <span className="text-slate-500 text-[10px] uppercase">Kiểu tóc:</span>
                                    <div className="flex gap-1.5 mt-1">
                                        {['#2563eb', '#dc2626', '#16a34a', '#d97706', '#1e293b'].map(c => (
                                            <button key={c} onClick={() => setAvatarHair(c)} className="w-5 h-5 rounded-full border border-slate-300" style={{ backgroundColor: c }} />
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <span className="text-slate-500 text-[10px] uppercase">Màu áo:</span>
                                    <div className="flex gap-1.5 mt-1">
                                        {['#f1f5f9', '#fed7aa', '#fbcfe8', '#bfdbfe', '#bbf7d0'].map(c => (
                                            <button key={c} onClick={() => setAvatarShirt(c)} className="w-5 h-5 rounded-full border border-slate-300" style={{ backgroundColor: c }} />
                                        ))}
                                    </div>
                                </div>
                                <div className="border-t pt-2 space-y-1">
                                    <span className="text-slate-500 text-[10px] uppercase">Phụ kiện:</span>
                                    <div className="grid grid-cols-3 gap-1">
                                        <button onClick={() => setAvatarAccessory('none')} className={`p-1 border rounded ${avatarAccessory==='none'?'bg-amber-100':'bg-white'}`}>Không</button>
                                        <button onClick={() => setAvatarAccessory('glasses')} className={`p-1 border rounded ${avatarAccessory==='glasses'?'bg-amber-100':'bg-white'}`}>Kính</button>
                                        <button onClick={() => setAvatarAccessory('headphones')} className={`p-1 border rounded ${avatarAccessory==='headphones'?'bg-amber-100':'bg-white'}`}>Tai nghe</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 7. RELAX TAB COMPONENT (VƯỜN THƯ GIÃN) ---
        const RelaxTab = ({ coins, setCoins, xp, setXp, triggerToast, gainRewards }) => {
            const [wheelSpinning, setWheelSpinning] = React.useState(false);
            const [wheelResult, setWheelResult] = React.useState(null);

            const [gameActive, setGameActive] = React.useState(false);
            const [score, setScore] = React.useState(0);
            const [starPos, setStarPos] = React.useState({ x: 50, y: 0 });
            const [bucketX, setBucketX] = React.useState(50);
            const gameIntervalRef = React.useRef(null);

            const [quizStep, setQuizStep] = React.useState(0);
            const [quizAnswers, setQuizAnswers] = React.useState([]);
            const [quizResult, setQuizResult] = React.useState(null);

            const handleSpin = () => {
                if (wheelSpinning) return;
                setWheelSpinning(true);
                setWheelResult(null);

                setTimeout(() => {
                    setWheelSpinning(false);
                    const prizes = [
                        { text: "+50 XP tinh thần", action: () => setXp(p => p + 50) },
                        { text: "+40 Mật ngọt gom lẹ", action: () => setCoins(p => p + 40) },
                        { text: "Mẹo Ong: Để điện thoại ở chế độ máy bay khi học nhé!", action: () => {} },
                        { text: "Bé Ong Vàng khen bạn: Bạn siêu kiên trì luôn đó!", action: () => {} }
                    ];
                    const chosen = prizes[Math.floor(Math.random() * prizes.length)];
                    chosen.action();
                    setWheelResult(chosen.text);
                    triggerToast(`Vòng quay: ${chosen.text}`);
                }, 3000);
            };

            const startGame = () => {
                setScore(0);
                setGameActive(true);
                setStarPos({ x: Math.floor(Math.random() * 90), y: 0 });
            };

            React.useEffect(() => {
                if (gameActive) {
                    gameIntervalRef.current = setInterval(() => {
                        setStarPos(prev => {
                            if (prev.y >= 90) {
                                const dist = Math.abs(prev.x - bucketX);
                                if (dist < 15) {
                                    setScore(s => s + 1);
                                }
                                return { x: Math.floor(Math.random() * 90), y: 0 };
                            }
                            return { ...prev, y: prev.y + 5 };
                        });
                    }, 100);
                } else {
                    clearInterval(gameIntervalRef.current);
                }
                return () => clearInterval(gameIntervalRef.current);
            }, [gameActive, bucketX]);

            const stopGame = () => {
                setGameActive(false);
                gainRewards(score * 2, score);
                triggerToast(`Kết thúc game! Điểm gom sao: ${score} sao. Nhận ngay ${score * 2} XP và ${score} Mật ngọt!`);
            };

            const quizQuestions = [
                { q: "Bạn bay gom mật tri thức hiệu quả nhất lúc nào?", a: ["Sáng sớm tinh mơ đón bình minh", "Đêm khuya thanh tịnh một mình", "Chiều tà lộng gió mát mẻ"] },
                { q: "Bạn thích gom nhị hoa kiến thức bằng phương pháp nào?", a: ["Sơ đồ tư duy đầy màu sắc", "Chép nháp liên tục ra giấy", "Đọc to tự giảng bài cho chính mình"] }
            ];

            const handleQuizAnswer = (idx) => {
                const nextAnswers = [...quizAnswers, idx];
                setQuizAnswers(nextAnswers);
                if (quizStep < quizQuestions.length - 1) {
                    setQuizStep(quizStep + 1);
                } else {
                    const code = nextAnswers.join('');
                    let res = "Ong Chúa Toàn Năng: Phù hợp gom mật ở mọi lúc mọi nơi!";
                    if (code === '00') res = "Chú Ong Ánh Sáng: Bay cực nhanh, thích lập sơ đồ tư duy vào ban ngày!";
                    if (code === '11') res = "Ong Đêm Yên Lặng: Ghi nhớ siêu việt, gom mật bài vở cực đỉnh vào ban đêm!";
                    setQuizResult(res);
                }
            };

            const resetQuiz = () => {
                setQuizStep(0);
                setQuizAnswers([]);
                setQuizResult(null);
            };

            return (
                <div className="max-w-5xl mx-auto space-y-6 animate-fade-in">
                    <h2 className="text-2xl font-black text-slate-900 fun-font">Vườn Thư Giãn Trút Bỏ Lo Âu 🧩</h2>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Lucky Wheel */}
                        <div className="bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] text-center">
                            <h3 className="font-extrabold text-slate-800 text-sm mb-2">Vòng Quay Mật Ngọt Mỗi Ngày</h3>
                            <div className={`text-6xl my-4 ${wheelSpinning ? 'animate-spin' : ''}`} style={{ animationDuration: '0.6s' }}>
                                🎡
                            </div>
                            {wheelResult && (
                                <div className="p-3 bg-yellow-100 border-2 border-slate-900 rounded-2xl text-xs font-bold mb-4">
                                    🎁 Phần thưởng: {wheelResult}
                                </div>
                            )}
                            <button
                                onClick={handleSpin}
                                disabled={wheelSpinning}
                                className="bg-amber-400 hover:bg-amber-500 text-slate-955 font-black px-6 py-2.5 rounded-2xl border-2 border-slate-955 transition-all shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]"
                            >
                                {wheelSpinning ? 'Đang quay...' : 'Thử Vận May 🎡'}
                            </button>
                        </div>

                        {/* Breathing Exercise */}
                        <div className="bg-pink-50 p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] text-center">
                            <h3 className="font-extrabold text-slate-800 text-sm mb-1">Thở Êm Dịu Như Chú Ong</h3>
                            <p className="text-[11px] text-slate-500 font-bold mb-4">Thư giãn tâm trí, giảm nhịp đập cánh để tập trung sâu hơn.</p>
                            <div className="w-28 h-28 mx-auto rounded-full bg-pink-200 border-2 border-slate-900 flex items-center justify-center animate-breathe font-black text-slate-800 text-sm">
                                Thở đều...
                            </div>
                            <p className="text-[10px] text-slate-400 font-bold mt-4">Hít vào khi hình tròn phồng to, thở ra khi xẹp lại.</p>
                        </div>

                        {/* Mini-Game: Catch Falling Stars */}
                        <div className="bg-sky-50 p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                            <h3 className="font-extrabold text-slate-800 text-sm mb-1">Trò Chơi: Hứng Nhị Hoa Rơi 🌟</h3>
                            <p className="text-[11px] text-slate-500 font-bold mb-3">Phản xạ nhanh giúp chú ong gom được nhiều nhị hoa rơi rụng.</p>

                            {gameActive ? (
                                <div className="relative bg-slate-900 h-48 rounded-2xl border-2 border-slate-950 overflow-hidden">
                                    <span className="absolute text-xl" style={{ left: `${starPos.x}%`, top: `${starPos.y}%` }}>🌸</span>
                                    
                                    <div 
                                        className="absolute bottom-1 bg-amber-400 border-2 border-white w-14 h-4 rounded-t-lg transition-all"
                                        style={{ left: `${bucketX}%` }}
                                    ></div>

                                    <div className="absolute inset-x-0 bottom-6 flex justify-between px-4">
                                        <button 
                                            onClick={() => setBucketX(prev => Math.max(0, prev - 12))}
                                            className="bg-white/40 border border-white text-white font-bold px-3 py-1 rounded text-xs select-none"
                                        >
                                            ⬅️ Trái
                                        </button>
                                        <button 
                                            onClick={() => setBucketX(prev => Math.min(85, prev + 12))}
                                            className="bg-white/40 border border-white text-white font-bold px-3 py-1 rounded text-xs select-none"
                                        >
                                            Phải ➡️
                                        </button>
                                    </div>

                                    <span className="absolute top-2 right-3 text-white font-bold text-xs">Điểm: {score}</span>
                                    <button onClick={stopGame} className="absolute top-2 left-3 bg-red-500 text-white font-bold text-[10px] px-2 py-1 rounded border">Dừng</button>
                                </div>
                            ) : (
                                <div className="text-center py-10 bg-white/50 rounded-2xl border-2 border-dashed border-slate-300">
                                    <button 
                                        onClick={startGame}
                                        className="bg-indigo-400 hover:bg-indigo-500 text-slate-955 border-2 border-slate-900 font-black px-6 py-2.5 rounded-xl shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]"
                                    >
                                        Bắt Đầu Chơi 🚀
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Interactive Learning Quiz & Funny Memes */}
                        <div className="bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] flex flex-col justify-between">
                            <div>
                                <h3 className="font-extrabold text-slate-800 text-sm mb-1">Trắc Nghiệm Bản Thân 🧠</h3>
                                {quizResult ? (
                                    <div className="bg-yellow-50 border-2 border-slate-900 p-4 rounded-2xl text-xs font-bold animate-fade-in">
                                        ✨ Phong cách: {quizResult}
                                        <button onClick={resetQuiz} className="block mt-3 text-indigo-600 underline font-black">Làm lại</button>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        <p className="text-xs font-bold text-slate-700">{quizQuestions[quizStep].q}</p>
                                        <div className="space-y-1.5">
                                            {quizQuestions[quizStep].a.map((ans, idx) => (
                                                <button
                                                    key={idx}
                                                    onClick={() => handleQuizAnswer(idx)}
                                                    className="w-full text-left bg-slate-50 border-2 border-slate-900 p-2 rounded-xl text-xs font-bold hover:bg-amber-100 transition-colors"
                                                >
                                                    {ans}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="border-t border-slate-100 pt-4 mt-4">
                                <span className="text-[10px] text-slate-400 font-black block uppercase mb-1">Meme Ong Mật Giải Trí:</span>
                                <div className="bg-slate-50 p-3 rounded-2xl border-2 border-slate-900 text-xs font-bold text-slate-600">
                                    {STUDY_MEMES[Math.floor(Math.random() * STUDY_MEMES.length)].emoji} "{STUDY_MEMES[Math.floor(Math.random() * STUDY_MEMES.length)].text}"
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 8. FUTURE ME TAB (THƯ GỬI ONG TƯƠNG LAI) ---
        const FutureTab = ({ savedLetters, setSavedLetters, triggerToast }) => {
            const [letterContent, setLetterContent] = React.useState('');
            const [deliveryTime, setDeliveryTime] = React.useState('6months');

            const handleSaveLetter = (e) => {
                e.preventDefault();
                if(!letterContent.trim()){
                    triggerToast("Bạn hãy viết vài dòng nhắn nhủ nha!", "info");
                    return;
                }
                const newLetter = {
                    id: Date.now(),
                    content: letterContent,
                    delivery: deliveryTime === '1month' ? '1 Tháng' : deliveryTime === '6months' ? '6 Tháng' : '1 Năm',
                    date: new Date().toLocaleDateString('vi-VN')
                };
                setSavedLetters([newLetter, ...savedLetters]);
                setLetterContent('');
                triggerToast("🔒 Đã khóa lá thư của con vào hũ mật thời gian bảo mật!");
            };

            return (
                <div className="max-w-5xl mx-auto space-y-6 animate-fade-in">
                    <div className="bg-gradient-to-r from-yellow-400 to-amber-500 border-4 border-slate-900 text-slate-950 p-6 rounded-3xl shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                        <h2 className="text-2xl font-black fun-font">Thư Gửi Ong Tương Lai ✉️</h2>
                        <p className="text-slate-800 text-xs font-bold mt-1 leading-relaxed">
                            Hãy viết một bức thư, đặt ra các cột mốc gom mật ngọt để nhắc nhở chính bản thân mình trong tương lai nhé.
                        </p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                            <h3 className="font-extrabold text-slate-800 text-md mb-4">Ghi thư nhắn nhủ bản thân</h3>
                            <form onSubmit={handleSaveLetter} className="space-y-4">
                                <textarea
                                    placeholder="Gửi chú ong tương lai chăm chỉ, bạn đã rèn luyện đạt được ước mơ chưa? Hãy nhớ luôn bền chí vượt khó nha..."
                                    value={letterContent}
                                    onChange={e => setLetterContent(e.target.value)}
                                    className="w-full h-40 p-4 border-2 border-slate-900 rounded-2xl focus:outline-none focus:ring-2 focus:ring-yellow-400 text-xs font-bold bg-amber-50/10 resize-none leading-relaxed"
                                />
                                <div className="grid grid-cols-3 gap-2">
                                    {[
                                        { id: '1month', label: '1 Tháng' },
                                        { id: '6months', label: '6 Tháng' },
                                        { id: '1year', label: '1 Năm' }
                                    ].map(t => (
                                        <button
                                            key={t.id}
                                            type="button"
                                            onClick={() => setDeliveryTime(t.id)}
                                            className={`py-2 rounded-xl text-xs font-black border-2 border-slate-950 transition-all ${deliveryTime === t.id ? 'bg-yellow-300' : 'bg-slate-50'}`}
                                        >
                                            {t.label}
                                        </button>
                                    ))}
                                </div>
                                <button
                                    type="submit"
                                    className="w-full bg-slate-900 hover:bg-slate-800 text-white border-2 border-slate-955 font-black py-3 rounded-2xl transition-all shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]"
                                >
                                    Niêm phong hũ mật thời gian 🔒
                                </button>
                            </form>
                        </div>

                        {/* Saved letters list */}
                        <div className="bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                            <h3 className="font-extrabold text-slate-800 text-sm mb-3">Hộp Thư Niêm Phong</h3>
                            <div className="space-y-3">
                                {savedLetters.map(letter => (
                                    <div key={letter.id} className="p-4 bg-slate-50 border-2 border-slate-900 rounded-2xl flex items-center justify-between">
                                        <div>
                                            <span className="text-xs font-extrabold text-indigo-600">📦 Khóa trong: {letter.delivery}</span>
                                            <span className="text-[10px] text-slate-400 block font-bold">Ngày khóa: {letter.date}</span>
                                        </div>
                                        <span className="text-2xl">🍯</span>
                                    </div>
                                ))}
                                {savedLetters.length === 0 && (
                                    <p className="text-xs text-slate-400 italic text-center py-6">Chưa có bức thư gửi tương lai nào.</p>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 9. JOURNAL & STATISTICS TAB (KÝ SỰ LÀM MẬT) ---
        const AnalyticsTab = ({ tasks, journals, setJournals, studyHoursToday, gardenLength, triggerToast }) => {
            const completedCount = tasks.filter(t => t.completed).length;
            const incompleteCount = tasks.length - completedCount;

            const [newMood, setNewMood] = React.useState('😊 Hào hứng');
            const [newFocus, setNewFocus] = React.useState(5);
            const [newNote, setNewNote] = React.useState('');

            const handleSaveJournal = (e) => {
                e.preventDefault();
                if (!newNote.trim()) {
                    triggerToast("Con hãy viết vài dòng ký sự gom mật nhé!", "info");
                    return;
                }
                const newLog = {
                    id: Date.now(),
                    date: new Date().toLocaleDateString('vi-VN'),
                    mood: newMood,
                    focus: Number(newFocus),
                    note: newNote
                };
                setJournals([newLog, ...journals]);
                setNewNote('');
                triggerToast("Lưu ký sự mật ong thành công!");
            };

            const achievements = [
                { id: 'pomo', name: 'Chuyên Gia Hút Mật 🌸', desc: 'Sở hữu tối thiểu 4 đoá hoa rực rỡ trong vườn', unlocked: gardenLength >= 4 },
                { id: 'todo', name: 'Vua Gom Mật 👑', desc: 'Hoàn thành ít nhất 2 nhị hoa To-do', unlocked: completedCount >= 2 },
                { id: 'streak', name: 'Ong Vàng Chăm Chỉ 🔥', desc: 'Duy trì chuỗi gieo mật hằng ngày', unlocked: true },
                { id: 'future', name: 'Ong Nhìn Xa Trông Rộng 🦉', desc: 'Tự tay khóa một hũ mật gửi tương lai', unlocked: false }
            ];

            return (
                <div className="max-w-5xl mx-auto space-y-6 animate-fade-in">
                    <h2 className="text-2xl font-black text-slate-900 fun-font">Ký Sự Làm Mật & Thống Kê 📊</h2>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Daily Journal Form */}
                        <div className="bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                            <h3 className="font-extrabold text-slate-800 text-md mb-1">Ghi Ký sự hôm nay</h3>
                            <p className="text-xs text-slate-400 font-bold mb-4">Ghi lại chặng đường gom mật để đút kết thêm nhiều kinh nghiệm bổ ích.</p>
                            
                            <form onSubmit={handleSaveJournal} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Tâm trạng làm việc:</label>
                                    <select 
                                        value={newMood} 
                                        onChange={e => setNewMood(e.target.value)}
                                        className="w-full px-4 py-3 rounded-2xl border-2 border-slate-900 text-xs font-bold bg-amber-50"
                                    >
                                        <option value="😊 Hào hứng">😊 Hào hứng, say mê</option>
                                        <option value="😐 Bình thường">😐 Bình thường, bền bỉ</option>
                                        <option value="😴 Mệt mỏi">😴 Hơi mỏi cánh dập dềnh</option>
                                        <option value="🤯 Áp lực">🤯 Quá tải phấn hoa bài học</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Sự tập trung (1 - 5 ⭐):</label>
                                    <div className="flex gap-2">
                                        {[1, 2, 3, 4, 5].map(val => (
                                            <button
                                                key={val}
                                                type="button"
                                                onClick={() => setNewFocus(val)}
                                                className={`flex-1 py-2 rounded-xl text-xs font-black border-2 border-slate-950 transition-all ${newFocus === val ? 'bg-yellow-400 shadow-[2px_2px_0px_0px_rgba(15,23,42,1)] scale-105' : 'bg-slate-50'}`}
                                            >
                                                {val} ⭐
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-600 mb-1.5 uppercase">Cảm nghĩ ngắn:</label>
                                    <textarea 
                                        placeholder="Hôm nay mình gom được bao nhiêu mật ngọt, nỗ lực ngày mai ra sao..." 
                                        value={newNote}
                                        onChange={e => setNewNote(e.target.value)}
                                        className="w-full px-4 py-3 rounded-2xl border-2 border-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-xs font-bold h-24 resize-none bg-amber-50/10"
                                    />
                                </div>
                                <button
                                    type="submit"
                                    className="w-full bg-yellow-400 hover:bg-yellow-500 border-4 border-slate-900 text-slate-955 font-black py-3 rounded-2xl transition-all shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]"
                                >
                                    Lưu Ký sự ngọt ngào 📝
                                </button>
                            </form>
                        </div>

                        {/* List of achievements and badges */}
                        <div className="bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
                            <h3 className="font-extrabold text-slate-800 text-md mb-3 flex items-center gap-1.5">
                                <span>🏅</span> Hệ Thống Huy Hiệu Đàn Ong
                            </h3>
                            <div className="space-y-4">
                                {achievements.map(item => (
                                    <div 
                                        key={item.id} 
                                        className={`p-3.5 border-2 rounded-2xl flex items-center gap-3 transition-all ${item.unlocked ? 'bg-emerald-50 border-emerald-400 shadow-[2px_2px_0px_0px_rgba(15,23,42,1)]' : 'bg-slate-100 border-slate-300 opacity-50'}`}
                                    >
                                        <div className="text-3xl">{item.unlocked ? '🏆' : '🔒'}</div>
                                        <div>
                                            <h4 className="font-bold text-xs text-slate-800">{item.name}</h4>
                                            <p className="text-[10px] text-slate-500 font-bold mt-1">{item.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* History Journals feed */}
                        <div className="bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] overflow-y-auto max-h-[420px] custom-scrollbar">
                            <h3 className="font-extrabold text-slate-800 text-md mb-3">Lịch sử thu mật ngọt</h3>
                            <div className="space-y-4">
                                {journals.map(item => (
                                    <div key={item.id} className="p-4 bg-slate-50 border-2 border-slate-900 rounded-2xl">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-xs font-black text-indigo-600">📅 {item.date}</span>
                                            <span className="text-xs font-black bg-slate-100 border-2 border-slate-900 px-2 rounded-full">{item.mood}</span>
                                        </div>
                                        <div className="text-amber-500 text-xs font-black mb-1">Độ tập trung: {'⭐'.repeat(item.focus)}</div>
                                        <p className="text-xs text-slate-700 leading-relaxed font-bold">"{item.note}"</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Chart Analytics Section */}
                    <div className="bg-white p-6 rounded-3xl border-4 border-slate-900 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] mt-6">
                        <h3 className="font-extrabold text-slate-800 text-lg mb-4">Biểu đồ trực quan tiến trình học</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                            <div className="space-y-4">
                                <h4 className="font-bold text-slate-500 text-xs uppercase tracking-wider">Thống kê mật ngọt tích lũy</h4>
                                <div className="flex items-center justify-between pb-2 border-b border-slate-100">
                                    <span className="text-sm font-bold text-slate-500">Nhiệm vụ gặt hái xong</span>
                                    <span className="font-black text-slate-900">{completedCount}</span>
                                </div>
                                <div className="flex items-center justify-between pb-2 border-b border-slate-100">
                                    <span className="text-sm font-bold text-slate-500">Nhiệm vụ còn lửng lơ</span>
                                    <span className="font-black text-slate-900">{incompleteCount}</span>
                                </div>
                                <div className="flex items-center justify-between font-black">
                                    <span>Tỷ lệ lấp đầy hũ mật</span>
                                    <span className="text-indigo-600">{tasks.length ? Math.round((completedCount/tasks.length)*100) : 0}%</span>
                                </div>
                            </div>

                            {/* Bar Chart Mockup representing hours studied this week */}
                            <div className="space-y-4">
                                <h4 className="font-bold text-slate-500 text-xs uppercase tracking-wider">Biểu đồ số giờ gom mật trong tuần</h4>
                                <div className="flex items-end justify-between h-40 pt-4 gap-2">
                                    {['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'].map((day, idx) => {
                                        const mockVals = [3, 4.5, 2, 6, 1.5, studyHoursToday, 4];
                                        const barHeight = (mockVals[idx] / 7) * 100;
                                        return (
                                            <div key={day} className="flex flex-col items-center flex-1">
                                                <div className="w-full bg-slate-100 rounded-lg h-32 flex items-end border-2 border-slate-900 overflow-hidden">
                                                    <div 
                                                        className="w-full bg-gradient-to-t from-yellow-400 to-amber-400 rounded-t-lg transition-all duration-700"
                                                        style={{ height: `${barHeight}%` }}
                                                        title={`${mockVals[idx]} Giờ`}
                                                    ></div>
                                                </div>
                                                <span className="text-[10px] font-black text-slate-600 mt-2">{day}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- RENDER BOOTSTRAP ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
